name: Product defect

description: Report a reproducible Nexora problem

title: "bug: "

labels:
  - bug
  - triage

body:
  - type: markdown
    attributes:
      value: |
        Use this form for reproducible product defects. Do not publish vulnerabilities, secrets or user data here; follow SECURITY.md and create a private Security Advisory.

        Current repository version: 3.2.0 Source/PWA prerelease. Signed production baseline: 3.1.2. State the exact release channel, version and commit when applicable.

  - type: input
    id: versions
    attributes:
      label: Client, Local Server and Pulse Cloud versions
      description: Include every affected component, release channel and commit/tag for source builds.
      placeholder: "Client 3.2.0 prerelease / Server 3.2.0 / Cloud disabled / commit abc123"
    validations:
      required: true

  - type: dropdown
    id: release_channel
    attributes:
      label: Release channel
      options:
        - Signed stable release
        - Source/PWA prerelease
        - Local source build
        - Local unsigned Windows build
        - Development branch
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Component
      options:
        - Windows Client
        - Windows Local Server
        - Browser / PWA
        - Android
        - Local Server API / Socket.IO
        - Trust devices / MLS secure messaging
        - Encrypted files / images / voice
        - Pulse Cloud / Cloud Identity / OAuth
        - Plus / Impulse sandbox
        - Installer / updater / release assets
        - Database migration / backup / restore
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Windows 11
        - Windows 10
        - Android physical device
        - Android emulator
        - Linux Local Server
        - Browser / PWA
        - Pulse Cloud deployment
        - Other
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment profile
      options:
        - localhost
        - LAN
        - Radmin VPN / private VPN
        - Public HTTPS domain
        - Local Pulse sandbox
        - Production Pulse Cloud
        - Not applicable
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary and impact
      description: What is broken, who is affected and what operation can no longer be completed safely or correctly?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Start ...
        2. Open ...
        3. Perform ...
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual result
      description: Include the stable error code/message when available.
    validations:
      required: true

  - type: textarea
    id: state
    attributes:
      label: Relevant state
      description: Include sanitized schema version, room role/policy, Trust device state, MLS epoch or Pulse mode when relevant. Do not include private keys or message content.

  - type: textarea
    id: diagnostics
    attributes:
      label: Sanitized diagnostics
      description: Attach request ID, log excerpt, screenshot or video. Remove passwords, cookies, OAuth/session tokens, TOTP/recovery codes, API/signing/private keys, invite codes, user content and personal data.
      render: shell

  - type: textarea
    id: regression
    attributes:
      label: Regression and workaround
      description: Did this work in a previous version? Is there a safe temporary workaround?

  - type: checkboxes
    id: checks
    attributes:
      label: Submission checks
      options:
        - label: I searched existing Issues and did not find a duplicate.
          required: true
        - label: I reproduced the problem on a supported version or supplied the exact branch/commit and release channel.
          required: true
        - label: I removed passwords, tokens, private keys, invite codes, message content and personal data.
          required: true
        - label: This is not a private vulnerability report.
          required: true
