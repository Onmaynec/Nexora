name: Ошибка

description: Сообщить о воспроизводимой проблеме Nexora

title: "bug: "

labels:
  - bug
  - triage

body:
  - type: markdown
    attributes:
      value: |
        Спасибо за отчёт. Для уязвимостей и утечек данных не используйте этот шаблон — следуйте SECURITY.md и создайте приватный Security Advisory. Stable-версия — 3.1.2; для development branch обязательно укажите точное имя ветки и commit SHA.

  - type: input
    id: versions
    attributes:
      label: Версии Client, Local Server и Pulse Cloud
      description: Укажите все затронутые версии и branch/commit для development build.
      placeholder: "Client 3.1.2 / Server 3.1.2 / Cloud 3.1.2 или disabled"
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Компонент
      options:
        - Windows Client
        - Windows Local Server
        - Browser / PWA
        - Android
        - Local Server API / Socket.IO
        - Pulse Cloud / Cloud Identity / OAuth
        - Plus / Impulse sandbox
        - Installer / updater
        - Trust Core / MLS development branch
        - Documentation
        - Другое
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Среда
      options:
        - Windows 11
        - Windows 10
        - Android
        - Linux server
        - Browser only
        - Pulse Cloud deployment
        - Другое
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Тип подключения
      options:
        - localhost
        - LAN
        - Radmin VPN / private VPN
        - Public HTTPS domain
        - Local Pulse sandbox
        - Production Pulse Cloud
        - Не применимо
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Краткое описание
      description: Что сломано и как это влияет на работу?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Шаги воспроизведения
      placeholder: |
        1. Открыть ...
        2. Нажать ...
        3. Увидеть ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Ожидаемый результат
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Фактический результат
    validations:
      required: true

  - type: textarea
    id: diagnostics
    attributes:
      label: Диагностика
      description: Приложите очищенный log, request ID, screenshot или video. Не публикуйте passwords, cookies, OAuth/session tokens, TOTP/recovery codes, API/signing/private keys, invite codes и пользовательские данные.
      render: shell

  - type: textarea
    id: regression
    attributes:
      label: Регрессия и дополнительный контекст
      description: Работало ли это раньше? Есть ли временный обходной путь? Для 3.2.0 укажите, воспроизводится ли проблема только в Trust Core/MLS branch.

  - type: checkboxes
    id: checks
    attributes:
      label: Проверки перед отправкой
      options:
        - label: Я проверил существующие Issues и не нашёл дубликат.
          required: true
        - label: Я воспроизвёл проблему на актуальной поддерживаемой версии либо указал точный development branch/commit.
          required: true
        - label: Я удалил passwords, session/OAuth tokens, API/signing/private keys, invite codes и персональные данные.
          required: true
        - label: Это не приватный отчёт об уязвимости.
          required: true
