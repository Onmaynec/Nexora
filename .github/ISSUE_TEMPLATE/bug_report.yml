name: Product defect

description: Report a reproducible Nexora problem

title: "bug: "

labels:
  - bug
  - triage

body:
  - type: markdown
    attributes:
      value: |
        Use this form for reproducible product defects. Do not publish vulnerabilities, secrets, private keys, message content or user data here. Follow SECURITY.md and use a private Security Advisory for security issues.

        Current version: 3.3.2 published UNSIGNED-TEST prerelease. Signed production baseline: 3.1.2. Versions 3.2.0–3.3.1 are superseded; reproduce on 3.3.2 when possible. For historical branches, include the exact branch and commit.

  - type: input
    id: versions
    attributes:
      label: Client, Local Server and Pulse Cloud versions
      description: Include every affected component, release channel and commit/tag for source builds.
      placeholder: "Client 3.3.2 UNSIGNED-TEST / Server 3.3.2 / Cloud disabled / tag v3.3.2"
    validations:
      required: true

  - type: input
    id: branch
    attributes:
      label: Branch, tag or release asset
      description: Use main/v3.3.2 for current reports, or provide the exact historical/development branch.
      placeholder: "main / v3.3.2 / agent/..."
    validations:
      required: true

  - type: dropdown
    id: release_channel
    attributes:
      label: Release channel
      options:
        - Signed stable release
        - Published UNSIGNED-TEST prerelease
        - Installed packaged Windows Client/Server
        - Local source build
        - Local unsigned Windows build
        - Development or historical branch
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Component
      options:
        - Windows Client
        - Windows Local Server
        - Browser / PWA
        - Android
        - Local Server API / Socket.IO
        - Authentication / bootstrap / sessions
        - Rooms / roles / bans / invitations
        - Trust device enrollment / verification / revocation
        - Trust resource limits / KeyPackages
        - MLS message / commit recovery
        - MLS Welcome request / recovery
        - Encrypted files / images / voice
        - Client updater / release assets
        - Post-update notes / Windows test mode
        - Server developer console
        - Pulse Cloud / Cloud Identity / OAuth
        - Plus / Impulse sandbox
        - Database migration / backup / restore
        - Maintenance / retention / rate limits
        - Project website / GitHub Pages
        - Documentation / branch status
        - Other
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Windows 11
        - Windows 10
        - Android physical device
        - Android emulator
        - Linux Local Server
        - Browser / installed PWA
        - Pulse Cloud deployment
        - GitHub Actions / release workflow
        - Other
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment profile
      options:
        - localhost
        - LAN
        - Radmin VPN / private VPN
        - Public HTTPS domain
        - Local Pulse sandbox
        - Production Pulse Cloud
        - GitHub Releases updater
        - Custom HTTPS update feed
        - Not applicable
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary and impact
      description: What is broken, who is affected and what operation cannot be completed safely or correctly?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Start ...
        2. Open ...
        3. Perform ...
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual result
      description: Include HTTP status, stable error code/message and Retry-After when available.
    validations:
      required: true

  - type: textarea
    id: state
    attributes:
      label: Relevant sanitized state
      description: Include schema, room role/policy, Trust device count/state, KeyPackage count, MLS group/epoch, Welcome pending state, updater state or Pulse mode. Do not include private keys or message content.

  - type: textarea
    id: diagnostics
    attributes:
      label: Sanitized diagnostics
      description: Attach request ID, short log excerpt, screenshot or video. Remove passwords, cookies, OAuth/session tokens, TOTP/recovery codes, API/signing/private keys, invite codes, user content and personal data.
      render: shell

  - type: textarea
    id: regression
    attributes:
      label: Regression and workaround
      description: Did this work in a previous version? Is there a safe temporary workaround without bypassing TLS, authorization, signing or MLS?

  - type: checkboxes
    id: checks
    attributes:
      label: Submission checks
      options:
        - label: I searched existing Issues and did not find a duplicate.
          required: true
        - label: I reproduced on 3.3.2 or supplied the exact branch/commit and explained why an older branch is required.
          required: true
        - label: I removed passwords, tokens, private keys, invite codes, message content and personal data.
          required: true
        - label: This is not a private vulnerability report.
          required: true
