name: Product defect

description: Report a reproducible Nexora problem

title: "bug: "

labels:
  - bug
  - triage

body:
  - type: markdown
    attributes:
      value: |
        Use this form for reproducible product defects. Do not publish vulnerabilities, secrets, private keys, message content or user data here; follow SECURITY.md and create a private Security Advisory.

        Current version: 3.2.3 Source/PWA prerelease. Signed production baseline: 3.1.2. Releases 3.2.0–3.2.2 are superseded; reproduce on 3.2.3 when possible.

  - type: input
    id: versions
    attributes:
      label: Client, Local Server and Pulse Cloud versions
      description: Include every affected component, release channel and commit/tag for source builds.
      placeholder: "Client 3.2.3 prerelease / Server 3.2.3 / Cloud disabled / commit abc123"
    validations:
      required: true

  - type: dropdown
    id: release_channel
    attributes:
      label: Release channel
      options:
        - Signed stable release
        - Source/PWA prerelease
        - Local source build
        - Local unsigned Windows build
        - Development branch
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Component
      options:
        - Windows Client
        - Windows Local Server
        - Browser / PWA
        - Android
        - Authentication / bootstrap / sessions
        - Local Server API / Socket.IO
        - Rooms / roles / bans / moderation
        - Trust device enrollment / verification / revocation
        - KeyPackage limits / inventory
        - MLS secure messaging / recovery
        - Encrypted files / images / voice
        - Rate limiting / resource governance
        - Maintenance / retention / cleanup
        - Pulse Cloud / Cloud Identity / OAuth
        - Plus / Impulse sandbox
        - Installer / updater / release assets
        - Database migration / backup / restore
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Windows 11
        - Windows 10
        - Android physical device
        - Android emulator
        - Linux Local Server
        - Browser / PWA
        - Pulse Cloud deployment
        - Other
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment profile
      options:
        - localhost
        - LAN
        - Radmin VPN / private VPN
        - Public HTTPS domain
        - Local Pulse sandbox
        - Production Pulse Cloud
        - Not applicable
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary and impact
      description: What is broken, who is affected and what operation cannot be completed correctly or safely?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Start ...
        2. Open ...
        3. Perform ...
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual result
      description: Include HTTP status, stable error code and exact user-visible message when available.
    validations:
      required: true

  - type: input
    id: retry_after
    attributes:
      label: Retry-After or timing information
      description: For HTTP 429 / RATE_LIMITED issues, include the Retry-After value and observed retry time. Otherwise enter "not applicable".
      placeholder: "Retry-After: 30; request succeeds after 30 seconds"
    validations:
      required: true

  - type: textarea
    id: state
    attributes:
      label: Relevant sanitized state
      description: Include schema, room role/policy/ban state, Trust device count/status, KeyPackage counts, group/conversation/epoch scope, recovery range or Pulse mode. Do not include private keys, full MLS state or message content.

  - type: textarea
    id: diagnostics
    attributes:
      label: Sanitized diagnostics
      description: Attach request ID, log excerpt, screenshot or video. Remove passwords, cookies, OAuth/session tokens, TOTP/recovery codes, API/signing/private keys, invite codes, message content and personal data.
      render: shell

  - type: textarea
    id: regression
    attributes:
      label: Regression and workaround
      description: Did this work in an earlier version? Does it reproduce on 3.2.3? Is there a safe temporary workaround?

  - type: checkboxes
    id: checks
    attributes:
      label: Submission checks
      options:
        - label: I searched existing Issues and did not find a duplicate.
          required: true
        - label: I reproduced the problem on a supported version or supplied the exact branch/commit and release channel.
          required: true
        - label: I removed passwords, tokens, private keys, invite codes, message content and personal data.
          required: true
        - label: This is not a private vulnerability report.
          required: true
