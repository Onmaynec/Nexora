name: Product defect

description: Report a reproducible Nexora problem

title: "bug: "

labels:
  - bug
  - triage

body:
  - type: markdown
    attributes:
      value: |
        Use this form for reproducible product defects. Do not publish vulnerabilities, secrets, private keys, message content or user data here. Follow SECURITY.md and use a private Security Advisory for security issues.

        Current version: 3.3.4 release candidate. Distribution is signed when policy exists; otherwise the official release is an explicit UNSIGNED-TEST prerelease. Signed production baseline: 3.1.2. Trust/MLS runtime is retired and legacy secure history is read-only.

  - type: input
    id: versions
    attributes:
      label: Client, Local Server and Pulse Cloud versions
      description: Include every affected component, release channel and commit/tag for source builds.
      placeholder: "Client 3.3.4 RC / Server 3.3.4 / Cloud disabled / commit or tag"
    validations:
      required: true

  - type: input
    id: branch
    attributes:
      label: Branch, tag or release asset
      description: Provide the exact branch, commit, tag or published asset name.
      placeholder: "main / release/3.3.4-post-mls / v3.3.4 / commit SHA"
    validations:
      required: true

  - type: dropdown
    id: release_channel
    attributes:
      label: Release channel
      options:
        - Signed stable release
        - Published UNSIGNED-TEST prerelease
        - Release candidate source build
        - Installed packaged Windows Client/Server
        - Browser/PWA
        - Android test build
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Include prerequisite account, room, role, session/device and network state.
      placeholder: |
        1. Start Server...
        2. Sign in as...
        3. Open...
        4. Perform...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual result
      description: Include stable error code, HTTP status and request ID when available. Remove private data.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Authentication or sessions/devices
        - Rooms, roles, bans or invites
        - Ordinary messages or realtime
        - Files, images or voice
        - Legacy secure-history read-only layer
        - Backup, restore or migration
        - Updater, signing or installer
        - Pulse Cloud or billing
        - Windows Client/Server
        - Browser/PWA or websites
        - Android
        - Documentation or release evidence
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS/browser/device, deployment profile, schema/readiness and sanitized Server ID/fingerprint.
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Safe evidence
      description: Sanitized screenshots/logs/request IDs only. Never attach databases, backups, tokens, keys or private user content.

  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I reproduced this on the exact version/commit stated above.
          required: true
        - label: This report contains no secrets, private keys, tokens, passwords or private user content.
          required: true
        - label: This is not a vulnerability report; security issues will be submitted privately.
          required: true
