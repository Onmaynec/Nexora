name: Report Nexora 3.1.2 patch

on:
  push:
    branches:
      - agent/nexora-3.1.2-bugfix

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  report-patch:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/nexora-3.1.2-bugfix
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
      - name: Run patcher and comment result
        shell: bash
        run: |
          set +e
          node scripts/apply-3.1.2.cjs > /tmp/patch.log 2>&1
          code=$?
          {
            echo '### 3.1.2 patch application output'
            echo
            echo '```text'
            cat /tmp/patch.log
            echo '```'
            echo
            echo "exit_code=$code"
          } > /tmp/comment.md
          gh pr comment 9 --repo Onmaynec/Nexora --body-file /tmp/comment.md
          exit "$code"
