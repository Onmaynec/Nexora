name: Extract exact Nexora 3.1.2 failure

on:
  push:
    branches:
      - agent/nexora-3.1.2-bugfix

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  exact-failure:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/nexora-3.1.2-bugfix
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: node scripts/apply-3.1.2.cjs
      - run: node scripts/sync-release-metadata.cjs
      - run: npm ci
      - name: Extract exact TAP failure
        shell: bash
        run: |
          set +e
          npm run test:unit > /tmp/tests.log 2>&1
          code=$?
          awk 'BEGIN{show=0;left=0} /^not ok /{show=1;left=35} show{print;left--} show && left<=0{exit}' /tmp/tests.log > /tmp/failure.log
          {
            echo '### Exact 3.1.2 failing test'
            echo
            echo '```text'
            cat /tmp/failure.log
            echo '```'
            echo
            echo "exit_code=$code"
          } > /tmp/comment.md
          gh pr comment 9 --repo Onmaynec/Nexora --body-file /tmp/comment.md
          exit "$code"
