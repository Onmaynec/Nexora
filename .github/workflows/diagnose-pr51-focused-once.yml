name: Diagnose PR51 focused consistency once

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/diagnose-pr51-focused-once.yml"

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/release-3.3.2-consistency-final
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
      - name: Run focused checks
        shell: bash
        run: |
          set +e
          {
            echo '=== release consistency ==='
            node scripts/check-release-consistency.cjs
            echo '=== consistency tests ==='
            node --test test/release-consistency.test.cjs
          } > /tmp/pr51-focused.log 2>&1
          status=$?
          set -e
          mkdir -p release-evidence
          tail -n 300 /tmp/pr51-focused.log > release-evidence/pr51-focused-diagnostic.txt
          echo "exitStatus=$status" >> release-evidence/pr51-focused-diagnostic.txt
      - name: Commit diagnostic and remove workflow from main
        shell: bash
        run: |
          set -euo pipefail
          git checkout main
          git pull --rebase origin main
          cp release-evidence/pr51-focused-diagnostic.txt /tmp/pr51-focused-diagnostic.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp /tmp/pr51-focused-diagnostic.txt release-evidence/pr51-focused-diagnostic.txt
          git rm .github/workflows/diagnose-pr51-focused-once.yml
          git add release-evidence/pr51-focused-diagnostic.txt
          git commit -m "docs(release): record PR51 focused consistency diagnostic [skip ci]"
          git push origin HEAD:main
