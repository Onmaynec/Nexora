name: Advanced docs diagnostic

on:
  pull_request:
    paths:
      - 'advanced-website/**'
      - 'docs/ROADMAP.md'
      - '.github/workflows/advanced-docs-diagnostic.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch branch and validate
        run: |
          git init -q .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --depth=1 origin "${GITHUB_HEAD_REF}"
          git checkout -q FETCH_HEAD
          node advanced-website/scripts/validate-content.mjs
