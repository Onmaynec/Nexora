name: Apply Nexora 3.2.0 MLS core

on:
  push:
    branches:
      - agent/nexora-3.2.0-trust-core-mls

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[3.2.0-core-applied]') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/nexora-3.2.0-trust-core-mls
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: node scripts/apply-3.2.0-core-integration.cjs
      - run: npm install ts-mls@1.6.2 --save-exact
      - run: |
          node --check server/trust-schema8.cjs
          node --check server/trust-core.cjs
          node --check server/trust-routes.cjs
          node --check server/trust-recovery.cjs
          node --check server/trust-recovery-routes.cjs
          node --check server/mls-transport.cjs
      - run: node --test test/trust-schema8.test.cjs test/trust-core.test.cjs
      - run: npm run build:web
      - name: Commit verified core
        shell: bash
        run: |
          set -euo pipefail
          rm -f scripts/apply-3.2.0-core-integration.cjs .github/workflows/apply-3.2.0-core.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: integrate Nexora 3.2.0 MLS core [3.2.0-core-applied]"
          git push origin HEAD:agent/nexora-3.2.0-trust-core-mls
