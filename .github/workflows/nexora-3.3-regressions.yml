name: Nexora 3.4 regressions

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nexora-3-4-regressions-${{ github.sha }}
  cancel-in-progress: true

jobs:
  patch-changelog:
    if: github.event_name == 'pull_request' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/3.4.0-stable-core-v2
          fetch-depth: 0
      - name: Add canonical 3.4.0 and 3.3.4 entries
        shell: bash
        env:
          CHANGELOG_PREFIX_B64: 
        run: |
          set -euo pipefail
          node -e 'const fs=require("node:fs");const p="CHANGELOG.md";let s=fs.readFileSync(p,"utf8");if(s.includes("## [3.4.0]"))process.exit(0);const m="## [3.3.3]";if(!s.includes(m))throw new Error("CHANGELOG insertion marker is missing");const prefix=Buffer.from(process.env.CHANGELOG_PREFIX_B64,"base64").toString("utf8");fs.writeFileSync(p,s.replace(m,prefix+m),"utf8");'
      - name: Commit changelog
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- CHANGELOG.md; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --check
          git commit -m "docs(release): add Nexora 3.4.0 and 3.3.4 changelog entries"
          git push origin HEAD:release/3.4.0-stable-core-v2

  regressions:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - name: Pulse Sandbox service
        run: node --test test/pulse-sandbox-service.test.cjs
      - name: Pulse Cloud catalog
        run: node --test test/pulse-catalog-3.3.test.cjs
      - name: Contract — ordinary delete and immutable legacy history
        run: node --test --test-name-pattern="regular deletion" test/release-3.3.0-regressions.test.cjs
      - name: Contract — legacy viewer has no write controls
        run: node --test --test-name-pattern="legacy secure viewer" test/release-3.3.0-regressions.test.cjs
      - name: Contract — ordinary voice waveform
        run: node --test --test-name-pattern="ordinary voice messages" test/release-3.3.0-regressions.test.cjs
      - name: Contract — post-MLS retirement
        run: node --test --test-name-pattern="post-MLS retirement" test/release-3.3.0-regressions.test.cjs
      - name: Website validation
        run: |
          node --check website/release-fallback.js
          node --check website/network-resilience.js
          node --check website/app.js
          node --check website/site-fixes.js
          node --check website/site-polish.js
          node website/generate-release-fallback.mjs --check
          node --test website/release-resilience.test.cjs
          node website/validate.mjs
          node website/validate-restored.mjs
      - name: Production web build
        run: npm run build:web
