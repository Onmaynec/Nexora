name: Nexora 3.3 regressions

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nexora-3.3-regressions-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  sync-main:
    if: github.event_name == 'pull_request' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/3.3.4-post-mls
          fetch-depth: 0
      - name: Merge latest main while preserving post-MLS conflict resolutions
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          set +e
          git merge --no-edit -X ours origin/main
          merge_status=$?
          set -e
          if [ "$merge_status" -ne 0 ]; then
            while IFS= read -r path; do
              [ -n "$path" ] || continue
              if git cat-file -e "HEAD:$path" 2>/dev/null; then
                git checkout --ours -- "$path"
                git add -- "$path"
              else
                git rm -f --ignore-unmatch -- "$path"
              fi
            done < <(git diff --name-only --diff-filter=U)
            if git diff --name-only --diff-filter=U | grep -q .; then
              echo "Unresolved merge conflicts remain" >&2
              git status --short
              exit 1
            fi
            git commit --no-edit
          fi
          git push origin HEAD:release/3.3.4-post-mls

  regressions:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - name: Pulse Sandbox service
        run: node --test test/pulse-sandbox-service.test.cjs
      - name: Pulse Cloud catalog
        run: node --test test/pulse-catalog-3.3.test.cjs
      - name: Contract — ordinary delete and immutable legacy history
        run: node --test --test-name-pattern="regular deletion" test/release-3.3.0-regressions.test.cjs
      - name: Contract — legacy viewer has no write controls
        run: node --test --test-name-pattern="legacy secure viewer" test/release-3.3.0-regressions.test.cjs
      - name: Contract — ordinary voice waveform
        run: node --test --test-name-pattern="ordinary voice messages" test/release-3.3.0-regressions.test.cjs
      - name: Contract — post-MLS retirement
        run: node --test --test-name-pattern="post-MLS retirement" test/release-3.3.0-regressions.test.cjs
      - name: Contract — Pulse Sandbox routes
        run: node --test --test-name-pattern="Pulse Sandbox serves" test/release-3.3.0-regressions.test.cjs
      - name: Contract — unsigned distribution
        run: node --test --test-name-pattern="unsigned test binaries" test/release-3.3.0-regressions.test.cjs
      - name: Contract — website
        run: node --test --test-name-pattern="website keeps" test/release-3.3.0-regressions.test.cjs
      - name: Contract — raw Stripe body
        run: node --test --test-name-pattern="raw Stripe" test/release-3.3.0-regressions.test.cjs
      - name: Website validation
        run: node --check website/app.js && node website/validate.mjs
      - name: Production web build
        run: npm run build:web
