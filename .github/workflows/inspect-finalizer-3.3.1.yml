name: Inspect Nexora 3.3.1 finalizer

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/inspect-finalizer-3.3.1.yml"

permissions:
  actions: read
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Inspect finalizer workflow
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p release-evidence
          gh run list --workflow finalize-3.3.1-release.yml --limit 10 --json databaseId,displayTitle,status,conclusion,headSha,event,createdAt,updatedAt,url > release-evidence/finalizer-v3.3.1.json
      - name: Commit diagnostic evidence and remove one-shot workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add release-evidence/finalizer-v3.3.1.json
          git rm .github/workflows/inspect-finalizer-3.3.1.yml
          git commit -m "docs(release): record 3.3.1 finalizer diagnostic [skip ci]"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
