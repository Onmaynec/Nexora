name: Diagnose Nexora 3.2.0

on:
  push:
    branches:
      - agent/nexora-3.2.0-trust-core-mls

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - name: Capture focused diagnostics
        id: diagnostic
        shell: bash
        run: |
          set +e
          npm run check > check.log 2>&1
          check_code=$?
          node --test test/trust-schema8.test.cjs test/trust-core.test.cjs > trust.log 2>&1
          trust_code=$?
          {
            echo '### Nexora 3.2.0 focused diagnostics'
            echo
            echo "check_exit=${check_code} trust_exit=${trust_code}"
            echo
            echo '#### npm run check · tail'
            echo '```text'
            tail -n 100 check.log
            echo '```'
            echo
            echo '#### Trust Core tests · tail'
            echo '```text'
            tail -n 140 trust.log
            echo '```'
          } > diagnostic.md
          echo "check_code=${check_code}" >> "$GITHUB_OUTPUT"
          echo "trust_code=${trust_code}" >> "$GITHUB_OUTPUT"
      - name: Publish diagnostic result
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment 12 --body-file diagnostic.md
      - name: Fail when diagnostic fails
        if: ${{ steps.diagnostic.outputs.check_code != '0' || steps.diagnostic.outputs.trust_code != '0' }}
        run: exit 1
