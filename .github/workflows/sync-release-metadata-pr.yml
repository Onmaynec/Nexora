name: Sync release metadata

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - package.json
      - scripts/sync-release-metadata.cjs
      - scripts/apply-3.3-source-patches.cjs
      - .github/workflows/sync-release-metadata-pr.yml

permissions:
  contents: write

concurrency:
  group: sync-release-metadata-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'agent/nexora-3.3.0')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: node scripts/sync-release-metadata.cjs
      - run: node scripts/apply-3.3-source-patches.cjs
      - name: Commit synchronized sources
        shell: bash
        run: |
          set -euo pipefail
          paths=(
            package-lock.json
            android/app/build.gradle.kts
            client/src/api.js
            client/src/components/MessagePane.jsx
            cloud/create-cloud-server-v11.cjs
            test/server.test.cjs
            test/build-config.test.cjs
          )
          if git diff --quiet -- "${paths[@]}"; then
            echo "Release metadata and deterministic source patches are already synchronized."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "4189822+github-actions[bot]@users.noreply.github.com"
          git add "${paths[@]}"
          git commit -m "chore(release): synchronize Nexora 3.3.0 sources"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
