name: Snapshot current Nexora 3.3.0 recovery status

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/recovery-status-now.yml"
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Snapshot latest recovery run
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-evidence
          gh api "repos/${{ github.repository }}/actions/workflows/recover-v3.3.0-release.yml/runs?per_page=5" \
            --jq '{capturedAt: (now | todate), workflowRuns: [.workflow_runs[] | {id, name, event, status, conclusion, run_number, created_at, updated_at, html_url, head_sha, head_branch}]}' \
            > release-evidence/v3.3.0-recovery-status-now.json
      - name: Commit snapshot
        shell: bash
        run: |
          set -euo pipefail
          git add release-evidence/v3.3.0-recovery-status-now.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "docs(release): snapshot current recovery status"
          git push origin HEAD:main
