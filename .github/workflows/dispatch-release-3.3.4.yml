name: Dispatch Nexora 3.3.4 publication

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/dispatch-release-3.3.4.yml"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.head_commit.message, 'release: Nexora 3.3.4')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Dispatch existing audited release workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run release.yml --repo "${{ github.repository }}" -f release_tag=v3.3.4
