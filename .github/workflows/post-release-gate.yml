name: Post-release main gate

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/post-release-gate.yml"
      - "release-evidence/v*.json"
      - "release-evidence/current.json"

permissions:
  contents: write

concurrency:
  group: post-release-main-gate
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - run: npm ci
      - run: npm run release:check
      - run: npm test
      - run: npm run test:soak
        env:
          NEXORA_SOAK_MINUTES: "1"
          NEXORA_SOAK_INTERVAL_MS: "500"
      - run: gradle -p android :app:assembleDebug --no-daemon
      - run: node --check website/app.js && node --check website/site-fixes.js && node website/validate.mjs && node website/validate-restored.mjs

      - name: Verify published release evidence
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const pkg = require('./package.json');
          const immutablePath = `release-evidence/v${pkg.version}.json`;
          const evidence = JSON.parse(fs.readFileSync(immutablePath, 'utf8'));
          const current = JSON.parse(fs.readFileSync('release-evidence/current.json', 'utf8'));
          if (evidence.version !== pkg.version) throw new Error('Release evidence version mismatch');
          if (evidence.tag !== `v${pkg.version}`) throw new Error('Release evidence tag mismatch');
          if (current.version !== pkg.version || current.tag !== `v${pkg.version}`) throw new Error('Current release evidence mismatch');
          if (evidence.draft || !evidence.prerelease) throw new Error('Release evidence classification mismatch');
          if (evidence.distribution !== 'unsigned-test') throw new Error('Unexpected release distribution');
          if (evidence.updaterMetadataPublished) throw new Error('Unsigned release exposes updater metadata');
          if (!Array.isArray(evidence.requiredAssets) || evidence.requiredAssets.length !== 7) throw new Error('Required asset evidence is incomplete');
          if (!Array.isArray(evidence.assets) || evidence.assets.length !== 7) throw new Error('Published asset evidence is incomplete');
          for (const asset of evidence.assets) {
            if (!asset.name || !asset.size || !/^sha256:[a-f0-9]{64}$/.test(asset.digest || '')) throw new Error(`Invalid asset evidence: ${asset.name || 'unknown'}`);
          }
          const smoke = evidence.smoke || {};
          if (smoke.status !== 'pass' || smoke.checksums !== 'pass') throw new Error('Published checksum smoke did not pass');
          if (smoke.client?.peHeader !== 'MZ' || smoke.client?.minimumSize !== 'pass') throw new Error('Client asset smoke did not pass');
          if (smoke.server?.peHeader !== 'MZ' || smoke.server?.minimumSize !== 'pass') throw new Error('Server asset smoke did not pass');
          if (smoke.android?.zipIntegrity !== 'pass' || smoke.android?.manifest !== 'pass') throw new Error('Android asset smoke did not pass');
          if (smoke.pwa?.zipIntegrity !== 'pass' || smoke.pwa?.indexHtml !== 'pass') throw new Error('PWA asset smoke did not pass');
          NODE

      - name: Record successful post-release gate
        shell: bash
        env:
          SOURCE_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          mkdir -p release-evidence
          node <<'NODE'
          const fs = require('node:fs');
          const pkg = require('./package.json');
          const record = {
            schemaVersion: 1,
            verifiedAt: new Date().toISOString(),
            repository: process.env.GITHUB_REPOSITORY,
            version: pkg.version,
            sourceSha: process.env.SOURCE_SHA,
            runId: Number(process.env.RUN_ID),
            runUrl: process.env.RUN_URL,
            gates: {
              releaseCheck: 'pass',
              linuxProductSuite: 'pass',
              schemaSoak: 'pass',
              androidBuild: 'pass',
              websiteValidation: 'pass',
              publishedReleaseEvidence: 'pass',
              publishedAssetSmoke: 'pass',
            },
          };
          fs.writeFileSync('release-evidence/post-release-main-gate.json', `${JSON.stringify(record, null, 2)}\n`, 'utf8');
          NODE
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add release-evidence/post-release-main-gate.json
          git commit -m "docs(release): record post-release main gate [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
