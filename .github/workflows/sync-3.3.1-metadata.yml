name: Sync Nexora 3.3.1 metadata

on:
  push:
    branches:
      - agent/nexora-3.3.1-server-startup-fix
    paths:
      - package.json
      - .github/workflows/sync-3.3.1-metadata.yml

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/nexora-3.3.1-server-startup-fix
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
      - name: Synchronize release metadata
        run: node scripts/sync-release-metadata.cjs
      - name: Synchronize release documentation
        shell: bash
        run: |
          node <<'NODE'
          "use strict";
          const fs = require("node:fs");

          const changelogPath = "CHANGELOG.md";
          let changelog = fs.readFileSync(changelogPath, "utf8");
          if (!changelog.includes("## [3.3.1] — 2026-07-23")) {
            const entry = `## [3.3.1] — 2026-07-23

### Исправлено

- Windows Nexora Server больше не завершается при запуске с \`MODULE_NOT_FOUND: ../shared/pulse-catalog.cjs\`;
- обязательный каталог \`shared/**/*\` включён в Electron Server payload и \`app.asar\`;
- release config validation проверяет наличие Pulse catalog и его runtime contract.

### Тесты

- добавлена регрессия, которая связывает import из \`server/pulse-sandbox-service.cjs\` с Server packaging manifest;
- дефект сначала подтверждён падающим \`npm test\`, затем исправлен тем же контрактом;
- версия package, lockfile, Client и Android metadata синхронизирована как \`3.3.1\`.

### Совместимость

- Local Server schema 8, API v3 и Trust/MLS API v4 сохранены;
- миграция базы, новые зависимости и изменение конфигурации не требуются.

`;
            changelog = changelog.replace("## [3.3.0] — 2026-07-23", `${entry}## [3.3.0] — 2026-07-23`);
            fs.writeFileSync(changelogPath, changelog, "utf8");
          }

          const readmePath = "README.md";
          let readme = fs.readFileSync(readmePath, "utf8");
          readme = readme.replace(
            "![Current version](https://img.shields.io/badge/current-3.3.0%20prerelease-c69cff)",
            "![Current version](https://img.shields.io/badge/current-3.3.1%20prerelease-c69cff)",
          );
          const statusRow = "| `3.3.1` | Исправление запуска Windows Server: shared Pulse runtime включён в installer и проверяется release gate | Signed release при наличии ключей или явно маркированный UNSIGNED-TEST prerelease |";
          if (!readme.includes(statusRow)) {
            readme = readme.replace(
              "| `3.3.0` | Trust recovery, расходуемые Импульсы, обновлённый Client UX, сайт и полный artifact pipeline | Signed release при наличии ключей или явно маркированный UNSIGNED-TEST prerelease |",
              `${statusRow}\n| \`3.3.0\` | Trust recovery, расходуемые Импульсы, обновлённый Client UX, сайт и полный artifact pipeline | Superseded by 3.3.1 because the Server installer omitted a required shared runtime module |`,
            );
          }
          readme = readme.replace(
            "`3.3.0` проходит build-, unit-, API-, integration-, performance-, security-, soak-, Android-, website- и Windows artifact-gates. При отсутствии сертификатов Windows/Android binaries публикуются только как явно маркированные `UNSIGNED-TEST` assets и не подключаются к production updater. Независимый E2EE-аудит не заявляется. Авторитетные документы текущей линии:\n\n- [Release Notes 3.3.0](RELEASE_NOTES_3.3.0.md);\n- [Security Review 3.3.0](SECURITY_REVIEW_3.3.0.md);\n- [Release Verification 3.3.0](RELEASE_VERIFICATION_3.3.0.md).",
            "`3.3.1` проходит build-, unit-, API-, integration-, performance-, security-, soak-, Android- и Windows artifact-gates. При отсутствии сертификатов Windows/Android binaries публикуются только как явно маркированные `UNSIGNED-TEST` assets и не подключаются к production updater. Независимый E2EE-аудит не заявляется. Авторитетные документы текущей линии:\n\n- [Release Notes 3.3.1](RELEASE_NOTES_3.3.1.md);\n- [Release Verification 3.3.1](RELEASE_VERIFICATION_3.3.1.md);\n- [Security Review 3.3.0](SECURITY_REVIEW_3.3.0.md) — security boundary не изменён."
          );
          if (!readme.includes("### Release 3.3.1")) {
            readme = readme.replace(
              "### Release 3.3.0",
              "### Release 3.3.1\n\n- исправлен crash установленного Nexora Server из-за отсутствующего `shared/pulse-catalog.cjs`;\n- `shared/**/*` включён в Windows Server `app.asar`;\n- release gate проверяет Server runtime payload и Pulse catalog contract;\n- schema 8, API v3 и Trust/MLS API v4 сохранены без миграции.\n\n### Release 3.3.0",
            );
          }
          readme = readme.replace("Nexora `3.3.0` не заявляет защиту от traffic analysis.", "Nexora `3.3.1` не заявляет защиту от traffic analysis.");
          fs.writeFileSync(readmePath, readme, "utf8");
          NODE
      - name: Commit generated metadata
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "Release metadata is already synchronized."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json android/app/build.gradle.kts client/src/api.js test/server.test.cjs test/build-config.test.cjs CHANGELOG.md README.md
          git commit -m "chore(release): sync generated metadata for 3.3.1"
          git push origin HEAD:agent/nexora-3.3.1-server-startup-fix
