name: Sync Nexora 3.3.1 metadata

on:
  push:
    branches:
      - agent/nexora-3.3.1-server-startup-fix
    paths:
      - package.json
      - .github/workflows/sync-3.3.1-metadata.yml

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/nexora-3.3.1-server-startup-fix
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
      - name: Synchronize release metadata
        run: node scripts/sync-release-metadata.cjs
      - name: Commit generated metadata
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "Release metadata is already synchronized."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json android/app/build.gradle.kts client/src/api.js test/server.test.cjs test/build-config.test.cjs
          git commit -m "chore(release): sync generated metadata for 3.3.1"
          git push origin HEAD:agent/nexora-3.3.1-server-startup-fix
