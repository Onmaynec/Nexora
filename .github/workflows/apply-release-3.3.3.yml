name: Apply Nexora 3.3.3

on:
  push:
    branches:
      - release/3.3.3
    paths:
      - release-patches/3.3.3/apply.py
      - .github/workflows/apply-release-3.3.3.yml
  pull_request:
    branches:
      - main
    paths:
      - release-patches/3.3.3/apply.py
      - .github/workflows/apply-release-3.3.3.yml

permissions:
  contents: write

concurrency:
  group: nexora-3.3.3-migration
  cancel-in-progress: false

jobs:
  apply-and-validate:
    if: ${{ github.event_name == 'pull_request' || !contains(github.event.head_commit.message, 'apply Nexora 3.3.3 source migration') }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/3.3.3
          fetch-depth: 0
      - name: Apply source migration
        run: |
          if [ -f release-patches/3.3.3/last-error.log ]; then
            cat release-patches/3.3.3/last-error.log
            exit 1
          fi
          set +e
          python3 release-patches/3.3.3/apply.py > /tmp/nexora-3.3.3-migration.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            cp /tmp/nexora-3.3.3-migration.log release-patches/3.3.3/last-error.log
            git config user.name "Nexora Release Bot"
            git config user.email "actions@users.noreply.github.com"
            git add release-patches/3.3.3/last-error.log
            git commit -m "ci(release): capture 3.3.3 migration failure"
            git push origin HEAD:release/3.3.3
            cat /tmp/nexora-3.3.3-migration.log
            exit "$status"
          fi
          cat /tmp/nexora-3.3.3-migration.log
      - name: Install dependencies
        run: npm ci
      - name: Synchronize release metadata
        run: npm run release:sync-version
      - name: Validate syntax and web production build
        run: npm run check
      - name: Run unit and regression tests
        run: npm run test:unit
      - name: Run performance tests
        run: npm run test:performance
      - name: Verify release consistency
        run: npm run release:consistency
      - name: Remove one-shot migration files
        run: |
          rm -f release-patches/3.3.3/apply.py
          rm -f release-patches/3.3.3/last-error.log
          rmdir release-patches/3.3.3 2>/dev/null || true
          rmdir release-patches 2>/dev/null || true
          rm -f .github/workflows/apply-release-3.3.3.yml
      - name: Commit validated release sources
        run: |
          git config user.name "Nexora Release Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "feat(release): apply Nexora 3.3.3 source migration"
          git push origin HEAD:release/3.3.3
