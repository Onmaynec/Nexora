name: Apply Nexora 3.3.3

on:
  push:
    branches:
      - release/3.3.3
    paths:
      - release-patches/3.3.3/apply.py
      - release-patches/3.3.3/fixups.py
      - release-patches/3.3.3/mls-fixups.py
      - release-patches/3.3.3/trust-route-fixups.py
      - .github/workflows/apply-release-3.3.3.yml
  pull_request:
    branches:
      - main
    paths:
      - release-patches/3.3.3/apply.py
      - release-patches/3.3.3/fixups.py
      - release-patches/3.3.3/mls-fixups.py
      - release-patches/3.3.3/trust-route-fixups.py
      - .github/workflows/apply-release-3.3.3.yml

permissions:
  contents: write

concurrency:
  group: nexora-3.3.3-migration
  cancel-in-progress: false

jobs:
  apply-and-validate:
    if: ${{ github.event_name == 'pull_request' || !contains(github.event.head_commit.message, 'apply Nexora 3.3.3 source migration') }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/3.3.3
          fetch-depth: 0
      - name: Normalize migration assertions
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path("release-patches/3.3.3/apply.py")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              "'    applyEffect(state, product, scopeId);\\n    return entitlement;'",
              "'  applyEffect(state, product, scopeId);\\n  return entitlement;'",
          ).replace(
              "'    applyEffect(state, product, scopeId);\\n    reconcilePulseEffects(state, timestamp.getTime());\\n    return entitlement;'",
              "'  applyEffect(state, product, scopeId);\\n  reconcilePulseEffects(state, timestamp.getTime());\\n  return entitlement;'",
          )
          for start_marker, end_marker in (
              ("# Collective goal API validation, moderator authorization and administrative/system events.", "# Idempotency keys are generated"),
              ("# Client MLS recovery: force remote synchronization on open and safely rejoin through a fresh Welcome.", "# Server route accepts forceRejoin"),
              ("# Server route accepts forceRejoin only for the authenticated current device.", "# Tests for the new pure and server-side behavior."),
          ):
              start = text.index(start_marker)
              end = text.index(end_marker, start)
              text = text[:start] + text[end:]
          path.write_text(text, encoding="utf-8")
          PY
      - name: Apply source migration
        id: migration
        continue-on-error: true
        run: |
          python3 release-patches/3.3.3/apply.py > nexora-3.3.3-migration.log 2>&1
          python3 release-patches/3.3.3/fixups.py >> nexora-3.3.3-migration.log 2>&1
          python3 release-patches/3.3.3/mls-fixups.py >> nexora-3.3.3-migration.log 2>&1
          python3 release-patches/3.3.3/trust-route-fixups.py >> nexora-3.3.3-migration.log 2>&1
          python3 - <<'PY' >> nexora-3.3.3-migration.log 2>&1
          from pathlib import Path
          for name in ("test/voice-waveform.test.cjs", "test/pulse-effects.test.cjs"):
              path = Path(name)
              text = path.read_text(encoding="utf-8")
              if text.startswith("\\\n"):
                  path.write_text(text[2:], encoding="utf-8")
          print("Generated regression test headers normalized.")
          PY
      - name: Upload migration diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nexora-3.3.3-migration-log
          path: nexora-3.3.3-migration.log
          if-no-files-found: error
          retention-days: 2
      - name: Stop on migration failure
        if: steps.migration.outcome == 'failure'
        run: |
          cat nexora-3.3.3-migration.log
          exit 1
      - name: Install dependencies
        run: npm ci
      - name: Synchronize release metadata
        run: npm run release:sync-version
      - name: Validate syntax and web production build
        id: validation
        continue-on-error: true
        run: npm run check > nexora-3.3.3-validation.log 2>&1
      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nexora-3.3.3-validation-log
          path: nexora-3.3.3-validation.log
          if-no-files-found: error
          retention-days: 2
      - name: Stop on validation failure
        if: steps.validation.outcome == 'failure'
        run: |
          cat nexora-3.3.3-validation.log
          exit 1
      - name: Run release tests
        id: tests
        continue-on-error: true
        run: |
          set +e
          npm run test:unit > nexora-3.3.3-tests.log 2>&1
          status=$?
          if [ "$status" -eq 0 ]; then npm run test:performance >> nexora-3.3.3-tests.log 2>&1; status=$?; fi
          if [ "$status" -eq 0 ]; then npm run release:consistency >> nexora-3.3.3-tests.log 2>&1; status=$?; fi
          exit "$status"
      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nexora-3.3.3-tests-log
          path: nexora-3.3.3-tests.log
          if-no-files-found: error
          retention-days: 2
      - name: Stop on test failure
        if: steps.tests.outcome == 'failure'
        run: |
          tail -n 300 nexora-3.3.3-tests.log
          exit 1
      - name: Remove one-shot migration files
        run: |
          rm -f release-patches/3.3.3/apply.py
          rm -f release-patches/3.3.3/fixups.py
          rm -f release-patches/3.3.3/mls-fixups.py
          rm -f release-patches/3.3.3/trust-route-fixups.py
          rm -f nexora-3.3.3-migration.log
          rm -f nexora-3.3.3-validation.log
          rm -f nexora-3.3.3-tests.log
          rmdir release-patches/3.3.3 2>/dev/null || true
          rmdir release-patches 2>/dev/null || true
          rm -f .github/workflows/apply-release-3.3.3.yml
      - name: Commit validated release sources
        run: |
          git config user.name "Nexora Release Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "feat(release): apply Nexora 3.3.3 source migration"
          git push origin HEAD:release/3.3.3
