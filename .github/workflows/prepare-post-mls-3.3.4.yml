name: Prepare Nexora 3.3.4 baseline

on:
  push:
    branches:
      - release/3.3.4-post-mls

permissions:
  contents: write

concurrency:
  group: prepare-nexora-3.3.4
  cancel-in-progress: false

jobs:
  prepare:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/3.3.4-post-mls
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - name: Prepare deterministic baseline tree
        run: |
          node scripts/prepare-post-mls-3.3.4.cjs
          npm install --package-lock-only --ignore-scripts
          node scripts/check-syntax.cjs
      - name: Commit prepared baseline
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "release: prepare Nexora 3.3.4 post-MLS baseline"
          git push origin HEAD:release/3.3.4-post-mls
