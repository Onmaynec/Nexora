name: Apply Nexora 3.2.2 fix

on:
  push:
    branches: [agent/nexora-3.2.2-trust-bootstrap-race]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/nexora-3.2.2-trust-bootstrap-race
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - run: node scripts/apply-3.2.2-trust-race-fix.cjs
      - run: npm ci
      - run: npm run release:check
      - name: Commit verified patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            CHANGELOG.md \
            RELEASE_NOTES_3.2.2.md \
            package.json \
            package-lock.json \
            android/app/build.gradle.kts \
            client/src/api.js \
            client/src/App.jsx \
            client/src/crypto/trust-client.js \
            test/build-config.test.cjs \
            test/regression-3.2.2.test.cjs
          git diff --cached --check
          git diff --cached --quiet && { echo "No patch changes were produced"; exit 1; }
          git commit -m "fix: order Trust configuration before draft effects"
          git push origin HEAD:agent/nexora-3.2.2-trust-bootstrap-race
