name: Apply Nexora website redesign

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/apply-website-redesign.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-website-redesign
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
      - name: Apply verified website package
        shell: bash
        run: |
          set -euo pipefail
          cat .github/site-redesign-parts/part-*.b64 > /tmp/nexora-site.tar.gz.b64
          base64 --decode /tmp/nexora-site.tar.gz.b64 > /tmp/nexora-site.tar.gz
          echo "d4a237bcece88db168a9249059f5ec01be39640f8a3b95ea38df612322b71dc0  /tmp/nexora-site.tar.gz" | sha256sum --check --strict
          tar -xzf /tmp/nexora-site.tar.gz -C "$GITHUB_WORKSPACE"
          rm -f website/assets/favicon.svg website/assets/og-cover.svg
          node --check website/app.js
          node website/validate.mjs
          test -f website/assets/nexora-icon.png
          rm -rf .github/site-redesign-parts
          rm -f .github/workflows/apply-website-redesign.yml
      - name: Commit final website
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md website .github
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "site: redesign showcase with live data and interactive canvas"
          git push origin HEAD:main
