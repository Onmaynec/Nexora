name: Diagnose Nexora 3.1.2 patch

on:
  push:
    branches:
      - agent/nexora-3.1.2-bugfix

permissions:
  contents: write

jobs:
  diagnose:
    if: ${{ !contains(github.event.head_commit.message, '[3.1.2-diagnostic]') && !contains(github.event.head_commit.message, '[3.1.2-applied]') }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/nexora-3.1.2-bugfix
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Capture deterministic patch result
        shell: bash
        run: |
          set +e
          node scripts/apply-3.1.2.cjs > /tmp/apply-3.1.2.log 2>&1
          code=$?
          git reset --hard HEAD
          mkdir -p .diagnostics
          cp /tmp/apply-3.1.2.log .diagnostics/apply-3.1.2.log
          printf '\nexit_code=%s\n' "$code" >> .diagnostics/apply-3.1.2.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .diagnostics/apply-3.1.2.log
          git commit -m "ci: capture 3.1.2 patch diagnostic [3.1.2-diagnostic]"
          git push origin HEAD:agent/nexora-3.1.2-bugfix
