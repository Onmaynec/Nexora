name: Trust Core check

on:
  push:
    branches:
      - agent/nexora-3.2.0-trust-core
  pull_request:
    paths:
      - "native/**"
      - ".github/workflows/trust-core-check.yml"

permissions:
  contents: read

jobs:
  rust-trust-core:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.87.0"
          targets: wasm32-unknown-unknown
          components: rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native
      - run: cargo fmt --manifest-path native/Cargo.toml --all -- --check
      - run: cargo clippy --manifest-path native/Cargo.toml --all-targets --all-features -- -D warnings
      - run: cargo test --manifest-path native/Cargo.toml --all-features
      - run: cargo check --manifest-path native/Cargo.toml --target wasm32-unknown-unknown --all-features
