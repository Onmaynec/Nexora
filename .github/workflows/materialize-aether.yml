name: Materialize Aether Lab

on:
  push:
    branches:
      - feat/website-aether-game
    paths:
      - "scripts/aether-payload/**"
      - ".github/workflows/materialize-aether.yml"

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/website-aether-game
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
      - name: Materialize and validate Aether Lab
        shell: bash
        run: |
          set -euo pipefail
          cat scripts/aether-payload/part-*.b64 | base64 --decode > /tmp/aether-payload.tar.gz
          tar -xzf /tmp/aether-payload.tar.gz -C .
          node --check website/game/game.js
          node --check website/site-fixes.js
          node website/validate.mjs
          node website/validate-restored.mjs
          rm -rf scripts/aether-payload
          rm -f .github/workflows/materialize-aether.yml
      - name: Commit generated website files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "feat(site): add Aether Lab interactive"
          git push origin HEAD:feat/website-aether-game
