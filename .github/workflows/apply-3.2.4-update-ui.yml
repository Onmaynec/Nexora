name: Apply Nexora 3.2.4 update UI

on:
  push:
    branches:
      - agent/nexora-3.2.4-updater-mls-recovery
    paths:
      - scripts/apply-3.2.4-update-ui.py
      - .github/workflows/apply-3.2.4-update-ui.yml
  pull_request:
    branches:
      - main
    paths:
      - scripts/apply-3.2.4-update-ui.py
      - .github/workflows/apply-3.2.4-update-ui.yml

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'agent/nexora-3.2.4-updater-mls-recovery'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/nexora-3.2.4-updater-mls-recovery
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm

      - name: Apply update UI patch
        run: python scripts/apply-3.2.4-update-ui.py

      - name: Install dependencies
        run: npm ci

      - name: Check and build
        run: npm run check

      - name: Unit tests
        run: npm run test:unit

      - name: Security audit
        run: npm run audit:security

      - name: Commit verified update UI
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: make Client update checks observable and retryable"
          git push origin HEAD:agent/nexora-3.2.4-updater-mls-recovery
