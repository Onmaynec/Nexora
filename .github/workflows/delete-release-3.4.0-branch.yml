name: Delete completed Nexora 3.4.0 RC branch

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/delete-release-3.4.0-branch.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  delete-branch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Delete completed remote release branch
        shell: bash
        run: |
          set -euo pipefail
          git push origin --delete release/3.4.0-stable-core-v2
