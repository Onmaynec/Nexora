name: Align Nexora 3.3.1 documentation status

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/fix-doc-status-3.3.1.yml"

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Align current documentation status
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path("docs/README.md")
          content = path.read_text(encoding="utf-8")
          old = "| [Security Verification Summary](../SECURITY_AUDIT.md) | automated verification and residual risk | Current 3.2.4 |"
          new = "| [Security Verification Summary](../SECURITY_AUDIT.md) | automated verification and residual risk | Current through 3.3.1 |"
          if old not in content:
              raise SystemExit("Expected stale status was not found")
          path.write_text(content.replace(old, new, 1), encoding="utf-8")
          PY
      - name: Commit documentation and remove one-shot workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/fix-doc-status-3.3.1.yml
          git add docs/README.md
          git commit -m "docs(release): align security summary status with 3.3.1 [skip ci]"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
