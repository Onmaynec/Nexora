name: Apply 3.2.0 candidate docs

on:
  push:
    branches: [agent/nexora-3.2.0-trust-core-mls]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-docs:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/nexora-3.2.0-trust-core-mls
          fetch-depth: 0
      - name: Apply guarded documentation patch
        run: |
          set -euxo pipefail
          test -f scripts/apply-3.2.0-candidate-docs.cjs
          node scripts/apply-3.2.0-candidate-docs.cjs
          rm scripts/apply-3.2.0-candidate-docs.cjs
          git diff --check
      - name: Commit documentation
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md docs/TRUST_CORE_3.2.0.md ADMIN_GUIDE_3.2.0.md TESTER_GUIDE_3.2.0.md scripts/apply-3.2.0-candidate-docs.cjs
          git diff --cached --check
          git commit -m "docs: document device-scoped realtime candidate"
          git push origin HEAD:agent/nexora-3.2.0-trust-core-mls
