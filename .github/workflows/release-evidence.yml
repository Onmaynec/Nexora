name: Record release evidence

on:
  release:
    types: [published]
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/release-evidence.yml"

permissions:
  contents: write

concurrency:
  group: release-evidence-${{ github.event.release.tag_name || github.sha }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0

      - name: Read published release
        shell: bash
        run: |
          set -euo pipefail
          version=$(node -p "require('./package.json').version")
          tag="v${version}"
          for attempt in $(seq 1 90); do
            if gh release view "$tag" --repo "${{ github.repository }}" --json tagName,name,isDraft,isPrerelease,url,assets > /tmp/release.json 2>/dev/null; then
              echo "Release $tag is available."
              echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"
              echo "RELEASE_TAG=$tag" >> "$GITHUB_ENV"
              exit 0
            fi
            echo "Attempt $attempt/90: release $tag is not published yet."
            sleep 10
          done
          echo "Release $tag was not published within the verification window." >&2
          exit 1

      - name: Smoke published Client, Server, Android and PWA assets
        shell: bash
        run: |
          set -euo pipefail
          directory=/tmp/nexora-release-assets
          rm -rf "$directory"
          mkdir -p "$directory"
          gh release download "$RELEASE_TAG" --repo "${{ github.repository }}" --dir "$directory"
          cd "$directory"
          sha256sum --check SHA256SUMS.txt

          client=$(find . -maxdepth 1 -type f -name "Nexora-Client-Setup-${RELEASE_VERSION}*.exe" -print -quit)
          server=$(find . -maxdepth 1 -type f -name "Nexora-Server-Setup-${RELEASE_VERSION}*.exe" -print -quit)
          android="./Nexora-Android-${RELEASE_VERSION}-UNSIGNED-TEST.apk"
          pwa="./Nexora-PWA-${RELEASE_VERSION}.zip"

          test -n "$client" && test -f "$client"
          test -n "$server" && test -f "$server"
          test -f "$android"
          test -f "$pwa"
          test "$(stat -c%s "$client")" -gt 10000000
          test "$(stat -c%s "$server")" -gt 10000000
          test "$(stat -c%s "$android")" -gt 100000
          test "$(stat -c%s "$pwa")" -gt 1024
          test "$(head -c 2 "$client")" = "MZ"
          test "$(head -c 2 "$server")" = "MZ"
          unzip -tq "$android"
          unzip -Z1 "$android" | grep -qx "AndroidManifest.xml"
          unzip -tq "$pwa"
          unzip -Z1 "$pwa" | grep -Eq '(^|/)index\.html$'

          CLIENT_NAME=$(basename "$client") SERVER_NAME=$(basename "$server") node <<'NODE'
          const fs = require('node:fs');
          const smoke = {
            status: 'pass',
            checksums: 'pass',
            client: { name: process.env.CLIENT_NAME, peHeader: 'MZ', minimumSize: 'pass' },
            server: { name: process.env.SERVER_NAME, peHeader: 'MZ', minimumSize: 'pass' },
            android: { name: `Nexora-Android-${process.env.RELEASE_VERSION}-UNSIGNED-TEST.apk`, zipIntegrity: 'pass', manifest: 'pass' },
            pwa: { name: `Nexora-PWA-${process.env.RELEASE_VERSION}.zip`, zipIntegrity: 'pass', indexHtml: 'pass' },
          };
          fs.writeFileSync('/tmp/release-smoke.json', `${JSON.stringify(smoke, null, 2)}\n`, 'utf8');
          NODE

      - name: Validate assets and write evidence
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          tag_sha=$(git rev-list -n 1 "$RELEASE_TAG")
          TAG_SHA="$tag_sha" node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const release = JSON.parse(fs.readFileSync('/tmp/release.json', 'utf8'));
          const smoke = JSON.parse(fs.readFileSync('/tmp/release-smoke.json', 'utf8'));
          const version = process.env.RELEASE_VERSION;
          const tag = process.env.RELEASE_TAG;
          const names = (release.assets || []).map((asset) => asset.name);
          const unsigned = names.includes(`Nexora-Client-Setup-${version}-UNSIGNED-TEST.exe`);
          const common = [
            `Nexora-Android-${version}-UNSIGNED-TEST.apk`,
            `Nexora-${version}-source.zip`,
            `Nexora-PWA-${version}.zip`,
            `Nexora-${version}.spdx.json`,
            'SHA256SUMS.txt',
          ];
          const signed = [
            `Nexora-Client-Setup-${version}.exe`,
            `Nexora-Client-Setup-${version}.exe.blockmap`,
            'latest.yml',
            `Nexora-Server-Setup-${version}.exe`,
          ];
          const testing = [
            `Nexora-Client-Setup-${version}-UNSIGNED-TEST.exe`,
            `Nexora-Server-Setup-${version}-UNSIGNED-TEST.exe`,
          ];
          const required = [...common, ...(unsigned ? testing : signed)];
          const missing = required.filter((name) => !names.includes(name));
          if (release.isDraft) throw new Error(`${tag} is still a draft`);
          if (missing.length) throw new Error(`Missing release assets: ${missing.join(', ')}`);
          if (unsigned && names.some((name) => name === 'latest.yml' || name.endsWith('.blockmap'))) {
            throw new Error('Unsigned release exposes updater metadata');
          }
          const evidence = {
            schemaVersion: 1,
            version,
            status: 'published',
            verifiedAt: new Date().toISOString(),
            repository: process.env.GITHUB_REPOSITORY,
            tag,
            tagSha: process.env.TAG_SHA,
            releaseName: release.name,
            releaseUrl: release.url,
            draft: Boolean(release.isDraft),
            prerelease: Boolean(release.isPrerelease),
            distribution: unsigned ? 'unsigned-test' : 'signed-production',
            updaterMetadataPublished: names.includes('latest.yml') || names.some((name) => name.endsWith('.blockmap')),
            requiredAssets: required,
            smoke,
            assets: (release.assets || []).map((asset) => ({
              name: asset.name,
              size: asset.size ?? null,
              url: asset.url ?? null,
              contentType: asset.contentType ?? null,
              digest: asset.digest ?? null,
            })),
          };
          const directory = path.join('release-evidence');
          fs.mkdirSync(directory, { recursive: true });
          const serialized = `${JSON.stringify(evidence, null, 2)}\n`;
          fs.writeFileSync(path.join(directory, `${tag}.json`), serialized, 'utf8');
          fs.writeFileSync(path.join(directory, 'current.json'), serialized, 'utf8');
          NODE

      - name: Commit immutable evidence record
        shell: bash
        run: |
          set -euo pipefail
          immutable="release-evidence/${RELEASE_TAG}.json"
          current="release-evidence/current.json"
          git pull --rebase origin main
          git add "$immutable" "$current"
          if git diff --cached --quiet; then
            echo "Evidence is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "docs(release): record ${RELEASE_TAG} publication evidence"
          git push origin HEAD:main
