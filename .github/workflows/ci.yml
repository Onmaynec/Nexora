name: Apply device-scoped realtime

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-device-scoped-realtime:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.number == 12
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/nexora-3.2.0-trust-core-mls
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - name: Apply guarded realtime patch and restore CI
        shell: bash
        run: |
          set -euo pipefail
          test -f scripts/apply-device-scoped-realtime.cjs
          node scripts/apply-device-scoped-realtime.cjs
          rm scripts/apply-device-scoped-realtime.cjs
          cat > .github/workflows/ci.yml <<'YAML'
          name: CI

          on:
            push:
              branches: [main]
            pull_request:
            workflow_dispatch:

          permissions:
            contents: read

          jobs:
            verify:
              runs-on: windows-latest
              timeout-minutes: 25
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-node@v4
                  with:
                    node-version: 22.16.0
                    cache: npm
                - run: npm ci
                - run: npm run check
                - run: npm run test:unit
                - run: npm run audit:security

            linux-tests:
              runs-on: ubuntu-latest
              timeout-minutes: 20
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-node@v4
                  with:
                    node-version: 22.16.0
                    cache: npm
                - run: npm ci
                - run: npm test

            release-gate:
              runs-on: ubuntu-latest
              timeout-minutes: 30
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-node@v4
                  with:
                    node-version: 22.16.0
                    cache: npm
                - run: npm ci
                - run: npm run release:check

            android-source:
              runs-on: ubuntu-latest
              timeout-minutes: 25
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-java@v4
                  with:
                    distribution: temurin
                    java-version: "17"
                - uses: gradle/actions/setup-gradle@v4
                  with:
                    gradle-version: "8.13"
                - run: gradle -p android :app:assembleDebug --no-daemon
          YAML
          git diff --check
          npm run check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server/trust-routes.cjs server/mls-transport.cjs client/src/crypto/trust-client.js client/src/App.jsx scripts/apply-device-scoped-realtime.cjs .github/workflows/ci.yml
          git commit -m "feat(trust): scope secure realtime delivery to verified devices"
          git push origin HEAD:agent/nexora-3.2.0-trust-core-mls
