name: Resolve 3.2.0 documentation sync

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  resolve-sync:
    if: github.event.pull_request.number == 15 && github.event.pull_request.head.ref == 'agent/nexora-3.2.0-main-sync'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/nexora-3.2.0-main-sync
          fetch-depth: 0
      - name: Preserve intentional 3.2.0 documentation while retaining main history
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin agent/nexora-3.2.0-trust-core-mls
          paths=(
            .github/ISSUE_TEMPLATE/bug_report.yml
            ADMIN_GUIDE.md
            CHANGELOG.md
            PROJECT_INDEX.md
            README.md
            RELEASE_NOTES_3.1.2.md
            RELEASE_VERIFICATION_3.1.2.md
            SECURITY.md
            SECURITY_AUDIT.md
            TESTER_GUIDE.md
            android/README.md
            docs/ARCHITECTURE.md
            docs/BUGFIX_3.1.2.md
            docs/GITHUB_RELEASE.md
            docs/PULSE.md
            docs/RELEASE_CHECKLIST.md
          )
          git checkout origin/agent/nexora-3.2.0-trust-core-mls -- "${paths[@]}"
          rm -f docs/.main-sync-marker
          git add -A
          git diff --cached --check
          git commit -m "chore: resolve main sync against 3.2.0 documentation"
          git push origin HEAD:agent/nexora-3.2.0-main-sync
