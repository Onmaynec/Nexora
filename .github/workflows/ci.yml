name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run test:unit
      - name: Capture security audit
        shell: pwsh
        run: |
          npm run audit:security *> security-audit.log
          $code = $LASTEXITCODE
          Get-Content security-audit.log
          Set-Content -Path security-audit.exit -Value $code
          exit 0
      - name: Upload security audit diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trust-security-audit
          path: |
            security-audit.log
            security-audit.exit
          retention-days: 1
      - name: Enforce security audit
        shell: pwsh
        run: |
          $code = [int](Get-Content security-audit.exit)
          exit $code

  linux-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - run: npm test

  android-source:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"
      - run: gradle -p android :app:assembleDebug --no-daemon
