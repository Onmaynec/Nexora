name: Apply device-scoped realtime

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-device-scoped-realtime:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.number == 12
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/nexora-3.2.0-trust-core-mls
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Apply guarded realtime patch
        run: |
          set -euxo pipefail
          test -f scripts/apply-device-scoped-realtime.cjs
          node scripts/apply-device-scoped-realtime.cjs
          git diff --check
      - name: Prepare patcher removal
        run: |
          set -euxo pipefail
          rm scripts/apply-device-scoped-realtime.cjs
          git diff --check
      - name: Verify patched production build
        run: npm run check
      - name: Stage and commit patched branch
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server/trust-routes.cjs server/mls-transport.cjs client/src/crypto/trust-client.js client/src/App.jsx scripts/apply-device-scoped-realtime.cjs
          git status --short
          git diff --cached --check
          git commit -m "feat(trust): scope secure realtime delivery to verified devices"
      - name: Push patched branch
        run: |
          set -euxo pipefail
          git push origin HEAD:agent/nexora-3.2.0-trust-core-mls
