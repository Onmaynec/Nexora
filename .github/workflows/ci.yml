name: CI

on:
  push:
    branches: [main, agent/release-3.3.2-consistency]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare-release-3-3-2:
    if: github.event_name == 'push' && github.ref == 'refs/heads/agent/release-3.3.2-consistency'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/release-3.3.2-consistency
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - name: Apply deterministic release changes
        run: |
          node scripts/prepare-release-3.3.2.cjs
          node scripts/finalize-release-3.3.2.cjs
      - run: npm ci
      - run: npm run release:consistency
      - run: node --test test/release-consistency.test.cjs
      - name: Commit prepared release branch
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yml
          git rm scripts/prepare-release-3.3.2.cjs scripts/finalize-release-3.3.2.cjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "release: Nexora 3.3.2 Release Consistency"
          git fetch origin agent/release-3.3.2-consistency
          git rebase origin/agent/release-3.3.2-consistency
          git push origin HEAD:agent/release-3.3.2-consistency

  verify:
    if: github.event_name != 'push' || github.ref != 'refs/heads/agent/release-3.3.2-consistency'
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run test:unit
      - run: npm run test:performance
      - run: npm run audit:security

  linux-tests:
    if: github.event_name != 'push' || github.ref != 'refs/heads/agent/release-3.3.2-consistency'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - run: npm test

  release-gate:
    if: github.event_name != 'push' || github.ref != 'refs/heads/agent/release-3.3.2-consistency'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - run: npm run release:check

  schema8-soak:
    if: github.event_name != 'push' || github.ref != 'refs/heads/agent/release-3.3.2-consistency'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - run: npm run test:soak
        env:
          NEXORA_SOAK_MINUTES: "1"
          NEXORA_SOAK_INTERVAL_MS: "500"

  android-source:
    if: github.event_name != 'push' || github.ref != 'refs/heads/agent/release-3.3.2-consistency'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"
      - run: gradle -p android :app:assembleDebug --no-daemon
