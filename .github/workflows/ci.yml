name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run test:unit
      - run: npm run audit:security

  linux-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - name: Capture focused MLS diagnostics
        shell: bash
        run: |
          set +e
          node --test \
            test/trust-schema8.test.cjs \
            test/trust-core.test.cjs \
            test/trust-recovery.test.cjs \
            test/e2ee-plaintext-guards.test.cjs \
            test/mls-interoperability.test.cjs > focused-mls.log 2>&1
          code=$?
          cat focused-mls.log
          printf '%s\n' "$code" > focused-mls.exit
          exit 0
      - name: Upload focused MLS diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: focused-mls-diagnostics
          path: |
            focused-mls.log
            focused-mls.exit
          retention-days: 1
      - run: npm test

  android-source:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"
      - run: gradle -p android :app:assembleDebug --no-daemon
