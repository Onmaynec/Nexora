name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run test:unit
      - run: npm run test:performance
      - run: npm run audit:security

  linux-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - run: npm test

  unit-diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - name: Run unit suite with retained diagnostics
        id: unit
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npm run test:unit > unit-failures.log 2>&1
          status=$?
          cat unit-failures.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"
      - name: Upload unit diagnostics
        if: steps.unit.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: unit-failures
          path: unit-failures.log
          if-no-files-found: error
          retention-days: 2
      - name: Enforce unit suite
        if: steps.unit.outcome == 'failure'
        run: exit 1

  release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - name: Verify synchronized release metadata
        run: node scripts/sync-release-metadata.cjs --check
      - name: Verify release consistency
        id: consistency
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npm run release:consistency > release-consistency.log 2>&1
          status=$?
          cat release-consistency.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"
      - name: Upload release consistency diagnostics
        if: steps.consistency.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: release-consistency-failures
          path: release-consistency.log
          if-no-files-found: error
          retention-days: 2
      - name: Enforce release consistency
        if: steps.consistency.outcome == 'failure'
        run: exit 1
      - name: Verify syntax, builder config and web build
        run: npm run check
      - name: Run unit, API, integration and realtime tests
        run: npm run test:unit
      - name: Run performance test
        run: npm run test:performance
      - name: Run security invariant and dependency audit
        run: npm run audit:security

  schema8-soak:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - run: npm run test:soak
        env:
          NEXORA_SOAK_MINUTES: "1"
          NEXORA_SOAK_INTERVAL_MS: "500"

  android-source:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"
      - run: gradle -p android :app:assembleDebug --no-daemon
