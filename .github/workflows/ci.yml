name: Apply store queue repair

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair-store-queue:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.number == 12
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/nexora-3.2.0-trust-core-mls
          fetch-depth: 0
      - name: Repair serialized mutation queue and restore CI
        shell: bash
        run: |
          set -euo pipefail
          test -f scripts/repair-store-queue.cjs
          node scripts/repair-store-queue.cjs
          rm scripts/repair-store-queue.cjs
          cat > .github/workflows/ci.yml <<'YAML'
          name: CI

          on:
            push:
              branches: [main]
            pull_request:
            workflow_dispatch:

          permissions:
            contents: read

          jobs:
            verify:
              runs-on: windows-latest
              timeout-minutes: 25
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-node@v4
                  with:
                    node-version: 22.16.0
                    cache: npm
                - run: npm ci
                - run: npm run check
                - run: npm run test:unit
                - run: npm run audit:security

            linux-tests:
              runs-on: ubuntu-latest
              timeout-minutes: 20
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-node@v4
                  with:
                    node-version: 22.16.0
                    cache: npm
                - run: npm ci
                - run: npm test

            release-gate:
              runs-on: ubuntu-latest
              timeout-minutes: 30
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-node@v4
                  with:
                    node-version: 22.16.0
                    cache: npm
                - run: npm ci
                - run: npm run release:check

            android-source:
              runs-on: ubuntu-latest
              timeout-minutes: 25
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-java@v4
                  with:
                    distribution: temurin
                    java-version: "17"
                - uses: gradle/actions/setup-gradle@v4
                  with:
                    gradle-version: "8.13"
                - run: gradle -p android :app:assembleDebug --no-daemon
          YAML
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server/store.cjs test/store-queue.test.cjs test/e2ee-attachment-transport.test.cjs scripts/repair-store-queue.cjs .github/workflows/ci.yml
          git commit -m "fix(store): keep mutation queue healthy after rejection"
          git push origin HEAD:agent/nexora-3.2.0-trust-core-mls
