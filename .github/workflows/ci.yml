name: CI diagnostic

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - id: diagnose
        name: Run isolated unit diagnostics
        shell: bash
        run: |
          set +e
          output="$(npm run test:unit 2>&1)"
          status=$?
          failure="$(grep -m1 'DIAGNOSTIC UNIT FAILURE:' <<<"$output" | sed 's/.*DIAGNOSTIC UNIT FAILURE: *//' | tr -cd '[:alnum:]_.\/-' | cut -c1-120)"
          detail="$(grep -E 'not ok|AssertionError|expected|actual|ERR_|Release consistency' <<<"$output" | tail -n 1 | tr -cd '[:alnum:] _.,:()\[\]\/-' | cut -c1-120)"
          echo "failure=${failure:-unknown}" >> "$GITHUB_OUTPUT"
          echo "detail=${detail:-no-detail}" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$output" | tail -n 60
          exit 0
      - name: "Failure file — ${{ steps.diagnose.outputs.failure }}"
        run: echo "${{ steps.diagnose.outputs.failure }}"
      - name: "Failure detail — ${{ steps.diagnose.outputs.detail }}"
        run: exit 1
