name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run test:unit
      - run: npm run audit:security

  linux-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - name: Capture full regression suite
        shell: bash
        run: |
          set +e
          npm test > full-test.log 2>&1
          code=$?
          printf '%s\n' "$code" > full-test.exit
          tail -n 180 full-test.log
          exit 0
      - name: Upload full regression diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-clock-regression
          path: |
            full-test.log
            full-test.exit
          retention-days: 1
      - name: Enforce full test result
        shell: bash
        run: test "$(cat full-test.exit)" = "0"

  android-source:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"
      - run: gradle -p android :app:assembleDebug --no-daemon
