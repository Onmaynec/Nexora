name: Apply Nexora 3.2.0 metadata

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-version:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'agent/nexora-3.2.0-trust-core-mls'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/nexora-3.2.0-trust-core-mls
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
      - name: Synchronize package, lockfile, Android and client metadata
        run: node scripts/apply-version-3.2.0.cjs
      - name: Commit verified version metadata
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "chore: synchronize Nexora 3.2.0 development metadata"
          git push origin HEAD:agent/nexora-3.2.0-trust-core-mls
