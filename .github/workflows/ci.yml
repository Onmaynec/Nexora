name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair-model:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/nexora-3.2.0-trust-core-mls
          fetch-depth: 0
      - name: Restore untouched model behavior
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f scripts/repair-model-e2ee.cjs ]; then exit 0; fi
          node scripts/repair-model-e2ee.cjs
          rm scripts/repair-model-e2ee.cjs
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server/model.cjs scripts/repair-model-e2ee.cjs
          git commit -m "fix(e2ee): preserve existing file visibility model"
          git push origin HEAD:agent/nexora-3.2.0-trust-core-mls

  verify:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run test:unit
      - run: npm run audit:security

  linux-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - run: npm test

  e2ee-attachment-diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - name: Capture focused TAP
        shell: bash
        run: |
          set +e
          node --test test/e2ee-attachments.test.cjs > e2ee-attachments.tap 2>&1
          code=$?
          cat e2ee-attachments.tap
          echo "$code" > e2ee-attachments.exit
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: e2ee-attachments-tap
          path: |
            e2ee-attachments.tap
            e2ee-attachments.exit
          retention-days: 1
      - name: Enforce focused TAP
        shell: bash
        run: test "$(cat e2ee-attachments.exit)" = "0"

  release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - run: npm run release:check

  android-source:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"
      - run: gradle -p android :app:assembleDebug --no-daemon
