name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prepare-release-surfaces:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'release/3.5.0-mobile-continuity' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - run: node scripts/prepare-mobile-continuity-3.5.cjs
      - run: node scripts/sync-release-metadata.cjs --check
      - name: Commit generated release surfaces
        shell: bash
        run: |
          set -euo pipefail
          git restore --source=HEAD -- .github/workflows/release.yml
          if [ -z "$(git status --porcelain)" ]; then
            echo "No generated changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "chore(release): synchronize Nexora 3.5.0 surfaces"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

  verify:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run test:unit
      - run: npm run test:performance
      - run: npm run audit:security

  linux-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - run: npm test

  unit-diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - name: Run unit suite with retained diagnostics
        id: unit
        continue-on-error: true
        shell: bash
        run: |
          set +e
          log="$RUNNER_TEMP/unit-failures.log"
          npm run test:unit > "$log" 2>&1
          status=$?
          cat "$log"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"
      - name: Upload unit diagnostics
        if: steps.unit.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: unit-failures
          path: ${{ runner.temp }}/unit-failures.log
          if-no-files-found: error
          retention-days: 2
      - name: Enforce unit suite
        if: steps.unit.outcome == 'failure'
        run: exit 1

  release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - name: Verify synchronized release metadata
        run: node scripts/sync-release-metadata.cjs --check
      - name: Verify release consistency
        id: consistency
        continue-on-error: true
        shell: bash
        run: |
          set +e
          log="$RUNNER_TEMP/release-consistency.log"
          npm run release:consistency > "$log" 2>&1
          status=$?
          cat "$log"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"
      - name: Upload release consistency diagnostics
        if: steps.consistency.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: release-consistency-failures
          path: ${{ runner.temp }}/release-consistency.log
          if-no-files-found: error
          retention-days: 2
      - name: Enforce release consistency
        if: steps.consistency.outcome == 'failure'
        run: exit 1
      - name: Verify syntax, builder config and web build
        run: npm run check
      - name: Run unit, API, integration and realtime tests
        run: npm run test:unit
      - name: Run performance test
        run: npm run test:performance
      - name: Run security invariant and dependency audit
        id: security
        continue-on-error: true
        shell: bash
        run: |
          set +e
          log="$RUNNER_TEMP/security-audit.log"
          npm run audit:security > "$log" 2>&1
          status=$?
          cat "$log"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"
      - name: Upload security diagnostics
        if: steps.security.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-failures
          path: ${{ runner.temp }}/security-audit.log
          if-no-files-found: error
          retention-days: 2
      - name: Enforce security audit
        if: steps.security.outcome == 'failure'
        run: exit 1

  schema8-soak:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - run: npm run test:soak
        env:
          NEXORA_SOAK_MINUTES: "1"
          NEXORA_SOAK_INTERVAL_MS: "500"

  android-source:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"
      - run: gradle -p android :app:assembleDebug --no-daemon
