name: Synchronize 3.2.0 branch

on:
  push:
    branches:
      - agent/nexora-3.2.0-trust-core-mls

permissions:
  contents: write

jobs:
  merge-main:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/nexora-3.2.0-trust-core-mls
          fetch-depth: 0
      - name: Merge current main and preserve intentional 3.2.0 conflicts
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          if ! git merge --no-ff --no-commit origin/main; then
            mapfile -t conflicts < <(git diff --name-only --diff-filter=U)
            if [ "${#conflicts[@]}" -eq 0 ]; then
              echo "Merge failed without resolvable file conflicts" >&2
              exit 1
            fi
            printf 'Preserving feature versions for conflicts:\n%s\n' "${conflicts[*]}"
            git checkout --ours -- "${conflicts[@]}"
            git add -- "${conflicts[@]}"
          fi
          cat > .github/workflows/ci.yml <<'YAML'
          name: CI

          on:
            push:
              branches: [main]
            pull_request:
            workflow_dispatch:

          permissions:
            contents: read

          jobs:
            verify:
              runs-on: windows-latest
              timeout-minutes: 25
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-node@v4
                  with:
                    node-version: 22.16.0
                    cache: npm
                - run: npm ci
                - run: npm run check
                - run: npm run test:unit
                - run: npm run audit:security

            linux-tests:
              runs-on: ubuntu-latest
              timeout-minutes: 20
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-node@v4
                  with:
                    node-version: 22.16.0
                    cache: npm
                - run: npm ci
                - run: npm test

            android-source:
              runs-on: ubuntu-latest
              timeout-minutes: 25
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-java@v4
                  with:
                    distribution: temurin
                    java-version: "17"
                - uses: gradle/actions/setup-gradle@v4
                  with:
                    gradle-version: "8.13"
                - run: gradle -p android :app:assembleDebug --no-daemon
          YAML
          git add -A
          git diff --cached --check
          git commit -m "merge: synchronize main documentation into 3.2.0"
          git push origin HEAD:agent/nexora-3.2.0-trust-core-mls
