name: Materialize Nexora 3.3.2 documentation branch

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"

permissions:
  contents: write

concurrency:
  group: materialize-nexora-3.3.2-current-docs
  cancel-in-progress: false

jobs:
  materialize:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - name: Materialize and verify working branch
        shell: bash
        run: |
          set -euo pipefail
          git show HEAD^:.github/workflows/ci.yml > /tmp/nexora-ci.yml
          git fetch origin agent/release-3.3.2-complete-consistency
          git checkout -B materialize origin/agent/release-3.3.2-complete-consistency
          node scripts/prepare-release-3.3.2-current-docs.cjs
          node scripts/prepare-release-3.3.2-current-docs-extra.cjs
          npm ci
          node --check scripts/check-release-consistency.cjs
          npm run release:consistency
          node --test test/release-consistency.test.cjs
          node --check website/app.js
          node --check website/site-fixes.js
          node website/validate.mjs
          cp /tmp/nexora-ci.yml .github/workflows/ci.yml
          git rm scripts/prepare-release-3.3.2-current-docs.cjs scripts/prepare-release-3.3.2-current-docs-extra.cjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs(release): complete Nexora 3.3.2 current consistency"
          git push origin HEAD:agent/release-3.3.2-complete-consistency
      - name: Restore canonical CI on main
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git checkout main
          git show HEAD^:.github/workflows/ci.yml > .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/ci.yml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "ci(release): restore canonical CI after 3.3.2 materialization [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
