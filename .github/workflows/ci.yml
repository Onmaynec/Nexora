name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-trust-clock-fix:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'agent/nexora-3.2.0-trust-core-mls'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/nexora-3.2.0-trust-core-mls
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
      - name: Apply exact source patch and restore CI
        run: node scripts/apply-trust-clock-fix.cjs
      - name: Commit verified patch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix: support functional clocks in Trust Core"
          git push origin HEAD:agent/nexora-3.2.0-trust-core-mls
