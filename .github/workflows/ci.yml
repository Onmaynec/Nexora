name: Apply store queue patch

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-store-queue:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.number == 12
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/nexora-3.2.0-trust-core-mls
          fetch-depth: 0
      - name: Patch and verify SqliteStore queue
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path("server/store.cjs")
          source = path.read_text(encoding="utf-8")
          before = "    this.queue = operation;\n    return operation;"
          after = "    this.queue = operation.catch(() => {});\n    return operation;"
          if source.count(before) != 1:
              raise SystemExit(f"expected one queue assignment, found {source.count(before)}")
          updated = source.replace(before, after, 1)
          if before in updated or updated.count(after) != 1:
              raise SystemExit("queue patch postcondition failed")
          path.write_text(updated, encoding="utf-8")
          PY
          grep -F 'this.queue = operation.catch(() => {});' server/store.cjs
          if git diff --quiet -- server/store.cjs; then
            echo "store.cjs did not change" >&2
            exit 1
          fi
          git diff --check -- server/store.cjs
          git diff -- server/store.cjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server/store.cjs
          git commit -m "fix(store): keep mutation queue healthy after rejection"
          git push origin HEAD:agent/nexora-3.2.0-trust-core-mls
