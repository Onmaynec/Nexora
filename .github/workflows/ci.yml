name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-security-patch:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/nexora-3.2.3-security-hardening' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/nexora-3.2.3-security-hardening
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - name: Apply, verify and commit patch or failure log
        shell: bash
        run: |
          set -uo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f APPLY_3_2_3_FAILURE.log
          {
            node scripts/apply-3.2.3-security-hardening.cjs &&
            npm run release:sync-version &&
            npm ci &&
            npm run release:check
          } >apply-output.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            output="$(cat apply-output.log)"
            git reset --hard HEAD
            printf '%s\n' "$output" > APPLY_3_2_3_FAILURE.log
            git add APPLY_3_2_3_FAILURE.log
            git commit -m "ci: capture 3.2.3 patch failure"
            git push origin HEAD:agent/nexora-3.2.3-security-hardening
            exit 0
          fi
          rm -f apply-output.log
          git add -A
          git diff --cached --check
          git diff --cached --quiet && { echo "No patch changes were produced"; exit 1; }
          git commit -m "fix: harden Trust resource and recovery boundaries"
          git push origin HEAD:agent/nexora-3.2.3-security-hardening

  verify:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run test:unit
      - run: npm run test:performance
      - run: npm run audit:security

  linux-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - run: npm test

  release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - run: npm run release:check

  schema8-soak:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - run: npm run test:soak
        env:
          NEXORA_SOAK_MINUTES: "1"
          NEXORA_SOAK_INTERVAL_MS: "500"

  android-source:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"
      - run: gradle -p android :app:assembleDebug --no-daemon
