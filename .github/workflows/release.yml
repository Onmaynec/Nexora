name: Nexora 3 release

on:
  push:
    tags: ["v*.*.*"]
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag, for example v3.0.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: nexora-release-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || (github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name) }}
  cancel-in-progress: false

jobs:
  release:
    if: >-
      github.event_name != 'workflow_run' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      startsWith(github.event.workflow_run.head_commit.message, 'release:'))
    runs-on: windows-latest
    timeout-minutes: 50
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || (github.event_name == 'push' && github.ref_name || '') }}
      CSC_LINK: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
      CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || (github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref) }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm

      - name: Resolve immutable release tag
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = node -p "require('./package.json').version"
          $tag = if ($env:GITHUB_EVENT_NAME -eq "workflow_run") { "v$version" } else { $env:RELEASE_TAG }
          $env:RELEASE_TAG = $tag
          node scripts/check-release-tag.cjs
          if ($LASTEXITCODE -ne 0) { throw "Release tag validation failed" }

          if ($env:GITHUB_EVENT_NAME -eq "workflow_run") {
            $remoteTag = git ls-remote --tags origin "refs/tags/$tag"
            if ($LASTEXITCODE -ne 0) { throw "Unable to inspect remote tag $tag" }
            $tagExists = -not [string]::IsNullOrWhiteSpace(($remoteTag -join "`n"))
            if ($tagExists) {
              git fetch --force origin "refs/tags/${tag}:refs/tags/${tag}"
              if ($LASTEXITCODE -ne 0) { throw "Unable to fetch existing tag $tag" }
              $tagHead = (git rev-list -n 1 $tag).Trim()
              $head = (git rev-parse HEAD).Trim()
              if ($tagHead -ne $head) { throw "Tag $tag already points to another commit" }
            } else {
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git tag -a $tag -m "Nexora $version"
              git push origin "refs/tags/$tag"
              if ($LASTEXITCODE -ne 0) { throw "Unable to publish tag $tag" }
            }
          }
          "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - run: npm ci
      - run: npm run release:check
      - run: npm run release:tag-check

      - name: Detect Authenticode configuration
        id: signing
        shell: pwsh
        run: |
          $certificate = -not [string]::IsNullOrWhiteSpace($env:CSC_LINK)
          $password = -not [string]::IsNullOrWhiteSpace($env:CSC_KEY_PASSWORD)
          $available = $certificate -and $password
          "available=$($available.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          if (-not $available) {
            Write-Warning "Authenticode secrets are absent or incomplete. Publishing a source/PWA prerelease; Windows updater assets stay blocked."
          }

      - name: Build verifiable source, PWA and SBOM artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = node -p "require('./package.json').version"
          New-Item -ItemType Directory -Force artifacts | Out-Null
          git archive --format=zip --output "artifacts/Nexora-$version-source.zip" $env:RELEASE_TAG
          if ($LASTEXITCODE -ne 0) { throw "Unable to archive source tag" }
          Compress-Archive -Path "client/dist/*" -DestinationPath "artifacts/Nexora-PWA-$version.zip" -CompressionLevel Optimal
          npm sbom --omit=dev --sbom-format=spdx | Set-Content -Encoding utf8 "artifacts/Nexora-$version.spdx.json"
          if ($LASTEXITCODE -ne 0) { throw "Unable to create SPDX SBOM" }

      - name: Prepare retry-safe release state
        id: existing
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tag = $env:RELEASE_TAG
          $json = gh release view $tag --json isDraft,isPrerelease,assets 2>$null
          if ($LASTEXITCODE -ne 0) {
            "published=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            exit 0
          }
          $release = ($json -join "`n") | ConvertFrom-Json
          if (-not $release.isDraft -and -not $release.isPrerelease) {
            Write-Host "Stable release $tag is immutable; nothing will be overwritten."
            "published=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            exit 0
          }
          if ($release.isPrerelease) {
            $unsafeAssets = @($release.assets | Where-Object { $_.name -match '\.(?:exe|blockmap)$' -or $_.name -eq 'latest.yml' })
            if ($unsafeAssets.Count -gt 0) { throw "Prerelease $tag already contains updater binaries and cannot be replaced automatically" }
          }
          gh release delete $tag --yes
          if ($LASTEXITCODE -ne 0) { throw "Unable to remove incomplete release $tag" }
          "published=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Validate signing secrets
        if: steps.signing.outputs.available == 'true' && steps.existing.outputs.published != 'true'
        run: npm run release:signing-check

      - name: Build signed Client update draft
        if: steps.signing.outputs.available == 'true' && steps.existing.outputs.published != 'true'
        run: npx electron-builder --config electron-builder.client.yml --win nsis --publish always

      - name: Build signed Server installer
        if: steps.signing.outputs.available == 'true' && steps.existing.outputs.published != 'true'
        run: npx electron-builder --config electron-builder.server.yml --win nsis --publish never

      - name: Publish complete signed stable release
        if: steps.signing.outputs.available == 'true' && steps.existing.outputs.published != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = node -p "require('./package.json').version"
          $tag = $env:RELEASE_TAG
          $assetPaths = @(
            "release/client/Nexora-Client-Setup-$version.exe",
            "release/client/Nexora-Client-Setup-$version.exe.blockmap",
            "release/client/latest.yml",
            "release/server/Nexora-Server-Setup-$version.exe",
            "artifacts/Nexora-$version-source.zip",
            "artifacts/Nexora-PWA-$version.zip",
            "artifacts/Nexora-$version.spdx.json"
          )
          foreach ($asset in $assetPaths) {
            if (-not (Test-Path -LiteralPath $asset)) { throw "Missing release asset: $asset" }
          }
          Get-FileHash $assetPaths -Algorithm SHA256 |
            Sort-Object Path |
            ForEach-Object { "$($_.Hash.ToLowerInvariant())  $([IO.Path]::GetFileName($_.Path))" } |
            Set-Content -Encoding utf8 artifacts/SHA256SUMS.txt

          $releaseJson = gh release view $tag --json isDraft,assets
          if ($LASTEXITCODE -ne 0) { throw "Electron Builder did not create draft release $tag" }
          $release = ($releaseJson -join "`n") | ConvertFrom-Json
          if (-not $release.isDraft) { throw "Release $tag became public before validation" }
          $publishedNames = @($release.assets | ForEach-Object { $_.name })
          foreach ($name in @("Nexora-Client-Setup-$version.exe", "Nexora-Client-Setup-$version.exe.blockmap", "latest.yml")) {
            if ($publishedNames -notcontains $name) { throw "Missing Client update asset in draft: $name" }
          }

          $extraPaths = @(
            (Resolve-Path "release/server/Nexora-Server-Setup-$version.exe").Path,
            (Resolve-Path "artifacts/Nexora-$version-source.zip").Path,
            (Resolve-Path "artifacts/Nexora-PWA-$version.zip").Path,
            (Resolve-Path "artifacts/Nexora-$version.spdx.json").Path,
            (Resolve-Path "artifacts/SHA256SUMS.txt").Path
          )
          gh release upload $tag $extraPaths
          if ($LASTEXITCODE -ne 0) { throw "Unable to upload Server, source or checksums for $tag" }

          $requiredNames = @($assetPaths | ForEach-Object { [IO.Path]::GetFileName($_) }) + "SHA256SUMS.txt"
          $final = (gh release view $tag --json assets | ConvertFrom-Json)
          if ($LASTEXITCODE -ne 0) { throw "Unable to verify release assets for $tag" }
          $finalNames = @($final.assets | ForEach-Object { $_.name })
          foreach ($name in $requiredNames) {
            if ($finalNames -notcontains $name) { throw "Release asset verification failed: $name" }
          }

          $notes = "RELEASE_NOTES_$version.md"
          if (Test-Path -LiteralPath $notes) {
            gh release edit $tag --title "Nexora $version" --notes-file $notes --draft=false --prerelease=false --latest
          } else {
            gh release edit $tag --title "Nexora $version" --draft=false --prerelease=false --latest
          }
          if ($LASTEXITCODE -ne 0) { throw "Unable to publish stable release $tag" }

      - name: Publish source and PWA prerelease
        if: steps.signing.outputs.available != 'true' && steps.existing.outputs.published != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = node -p "require('./package.json').version"
          $sourceAssets = @(
            "artifacts/Nexora-$version-source.zip",
            "artifacts/Nexora-PWA-$version.zip",
            "artifacts/Nexora-$version.spdx.json"
          )
          Get-FileHash $sourceAssets -Algorithm SHA256 |
            Sort-Object Path |
            ForEach-Object { "$($_.Hash.ToLowerInvariant())  $([IO.Path]::GetFileName($_.Path))" } |
            Set-Content -Encoding utf8 artifacts/SHA256SUMS.txt
          $resolved = @($sourceAssets | ForEach-Object { (Resolve-Path $_).Path }) + (Resolve-Path "artifacts/SHA256SUMS.txt").Path
          $notes = "RELEASE_NOTES_$version.md"
          if (Test-Path -LiteralPath $notes) {
            gh release create $env:RELEASE_TAG $resolved --verify-tag --title "Nexora $version — Source/PWA" --notes-file $notes --prerelease
          } else {
            gh release create $env:RELEASE_TAG $resolved --verify-tag --title "Nexora $version — Source/PWA" --generate-notes --prerelease
          }
          if ($LASTEXITCODE -ne 0) { throw "Unable to publish source/PWA prerelease" }

      - name: Explain Windows signing gate
        if: steps.signing.outputs.available != 'true'
        shell: pwsh
        run: |
          @"
          ## Windows installer gate
          Source, PWA and SPDX SBOM were published as a prerelease. Signed `.exe`, `latest.yml`
          and blockmap remain intentionally absent until both `WINDOWS_CERTIFICATE_BASE64` and
          `WINDOWS_CERTIFICATE_PASSWORD` are configured. The updater never receives unsigned binaries.
          "@ | Add-Content -Encoding utf8 $env:GITHUB_STEP_SUMMARY
