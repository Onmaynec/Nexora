name: Nexora 3 release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag, for example v3.3.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: nexora-release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      startsWith(github.event.workflow_run.head_commit.message, 'release:'))
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || '' }}
      CSC_LINK: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
      CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || inputs.release_tag }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Resolve immutable release tag
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = node -p "require('./package.json').version"
          $tag = if ($env:GITHUB_EVENT_NAME -eq "workflow_run") { "v$version" } else { $env:RELEASE_TAG }
          $env:RELEASE_TAG = $tag
          node scripts/check-release-tag.cjs
          if ($LASTEXITCODE -ne 0) { throw "Release tag validation failed" }

          if ($env:GITHUB_EVENT_NAME -eq "workflow_run") {
            $remoteTag = git ls-remote --tags origin "refs/tags/$tag"
            if ($LASTEXITCODE -ne 0) { throw "Unable to inspect remote tag $tag" }
            $tagExists = -not [string]::IsNullOrWhiteSpace(($remoteTag -join "`n"))
            if ($tagExists) {
              git fetch --force origin "refs/tags/${tag}:refs/tags/${tag}"
              if ($LASTEXITCODE -ne 0) { throw "Unable to fetch existing tag $tag" }
              $tagHead = (git rev-list -n 1 $tag).Trim()
              $head = (git rev-parse HEAD).Trim()
              if ($tagHead -ne $head) { throw "Tag $tag already points to another commit" }
            } else {
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git tag -a $tag -m "Nexora $version"
              git push origin "refs/tags/$tag"
              if ($LASTEXITCODE -ne 0) { throw "Unable to publish tag $tag" }
            }
          }
          "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - run: npm ci
      - run: npm run release:check
      - run: npm run release:tag-check

      - name: Inspect existing release
        id: existing
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $json = gh release view $env:RELEASE_TAG --json isDraft,isPrerelease 2>$null
          if ($LASTEXITCODE -ne 0) {
            "published=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            exit 0
          }
          $release = ($json -join "`n") | ConvertFrom-Json
          if (-not $release.isDraft -and -not $release.isPrerelease) {
            Write-Host "Stable release $env:RELEASE_TAG is immutable."
            "published=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            exit 0
          }
          gh release delete $env:RELEASE_TAG --yes
          if ($LASTEXITCODE -ne 0) { throw "Unable to remove incomplete prerelease $env:RELEASE_TAG" }
          "published=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Detect Authenticode configuration
        if: steps.existing.outputs.published != 'true'
        id: signing
        shell: pwsh
        run: |
          $certificate = -not [string]::IsNullOrWhiteSpace($env:CSC_LINK)
          $password = -not [string]::IsNullOrWhiteSpace($env:CSC_KEY_PASSWORD)
          $available = $certificate -and $password
          "available=$($available.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          if (-not $available) {
            Write-Warning "Authenticode secrets are absent. Windows installers will be published only as explicitly named UNSIGNED TEST builds; updater metadata will not be published."
          }

      - name: Prepare source and PWA archives
        if: steps.existing.outputs.published != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = node -p "require('./package.json').version"
          New-Item -ItemType Directory -Force artifacts | Out-Null
          git archive --format=zip --output "artifacts/Nexora-$version-source.zip" $env:RELEASE_TAG
          if ($LASTEXITCODE -ne 0) { throw "Unable to archive source tag" }
          if (-not (Test-Path -LiteralPath "client/dist/index.html")) { throw "Production web build is missing" }
          Compress-Archive -Path "client/dist/*" -DestinationPath "artifacts/Nexora-PWA-$version.zip" -CompressionLevel Optimal -Force
          foreach ($file in @("artifacts/Nexora-$version-source.zip", "artifacts/Nexora-PWA-$version.zip")) {
            if (-not (Test-Path -LiteralPath $file) -or (Get-Item $file).Length -lt 1024) { throw "Invalid release archive: $file" }
          }

      - name: Generate and validate SPDX SBOM
        if: steps.existing.outputs.published != 'true'
        shell: bash
        run: |
          set -euo pipefail
          version=$(node -p "require('./package.json').version")
          output="artifacts/Nexora-${version}.spdx.json"
          if ! npm sbom --omit=dev --sbom-format=spdx > "$output"; then
            echo "npm sbom failed; using the repository SPDX fallback generator" >&2
            node scripts/generate-spdx-sbom.cjs "$output"
          fi
          node -e "const fs=require('node:fs');const p=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));if(p.spdxVersion!=='SPDX-2.3'||!Array.isArray(p.packages)||!p.packages.length)process.exit(1)" "$output"

      - name: Build Android unsigned test artifact
        if: steps.existing.outputs.published != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = node -p "require('./package.json').version"
          gradle -p android :app:assembleDebug --no-daemon
          if ($LASTEXITCODE -ne 0) { throw "Android debug build failed" }
          $apk = Get-ChildItem -Path "android/app/build/outputs/apk/debug" -Filter "*.apk" | Sort-Object Length -Descending | Select-Object -First 1
          if (-not $apk) { throw "Android APK was not created" }
          Copy-Item $apk.FullName "artifacts/Nexora-Android-$version-UNSIGNED-TEST.apk" -Force

      - name: Validate signing secrets
        if: steps.existing.outputs.published != 'true' && steps.signing.outputs.available == 'true'
        run: npm run release:signing-check

      - name: Build signed Windows installers
        if: steps.existing.outputs.published != 'true' && steps.signing.outputs.available == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          npx electron-builder --config electron-builder.client.yml --win nsis --publish never
          if ($LASTEXITCODE -ne 0) { throw "Signed Client build failed" }
          npx electron-builder --config electron-builder.server.yml --win nsis --publish never
          if ($LASTEXITCODE -ne 0) { throw "Signed Server build failed" }

      - name: Build explicitly unsigned Windows test installers
        if: steps.existing.outputs.published != 'true' && steps.signing.outputs.available != 'true'
        shell: pwsh
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          $ErrorActionPreference = "Stop"
          $version = node -p "require('./package.json').version"
          npx electron-builder --config electron-builder.client.yml --win nsis --publish never
          if ($LASTEXITCODE -ne 0) { throw "Unsigned Client build failed" }
          npx electron-builder --config electron-builder.server.yml --win nsis --publish never
          if ($LASTEXITCODE -ne 0) { throw "Unsigned Server build failed" }
          Copy-Item "release/client/Nexora-Client-Setup-$version.exe" "artifacts/Nexora-Client-Setup-$version-UNSIGNED-TEST.exe" -Force
          Copy-Item "release/server/Nexora-Server-Setup-$version.exe" "artifacts/Nexora-Server-Setup-$version-UNSIGNED-TEST.exe" -Force

      - name: Publish complete signed release
        if: steps.existing.outputs.published != 'true' && steps.signing.outputs.available == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = node -p "require('./package.json').version"
          $assets = @(
            "release/client/Nexora-Client-Setup-$version.exe",
            "release/client/Nexora-Client-Setup-$version.exe.blockmap",
            "release/client/latest.yml",
            "release/server/Nexora-Server-Setup-$version.exe",
            "artifacts/Nexora-Android-$version-UNSIGNED-TEST.apk",
            "artifacts/Nexora-$version-source.zip",
            "artifacts/Nexora-PWA-$version.zip",
            "artifacts/Nexora-$version.spdx.json"
          )
          foreach ($asset in $assets) { if (-not (Test-Path -LiteralPath $asset)) { throw "Missing release asset: $asset" } }
          Get-FileHash $assets -Algorithm SHA256 | Sort-Object Path | ForEach-Object { "$($_.Hash.ToLowerInvariant())  $([IO.Path]::GetFileName($_.Path))" } | Set-Content -Encoding utf8 artifacts/SHA256SUMS.txt
          $all = @($assets | ForEach-Object { (Resolve-Path $_).Path }) + (Resolve-Path "artifacts/SHA256SUMS.txt").Path
          $notes = "RELEASE_NOTES_$version.md"
          if (Test-Path -LiteralPath $notes) {
            gh release create $env:RELEASE_TAG $all --verify-tag --title "Nexora $version" --notes-file $notes --latest
          } else {
            gh release create $env:RELEASE_TAG $all --verify-tag --title "Nexora $version" --generate-notes --latest
          }
          if ($LASTEXITCODE -ne 0) { throw "Unable to publish signed release" }

      - name: Publish complete unsigned testing prerelease
        if: steps.existing.outputs.published != 'true' && steps.signing.outputs.available != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = node -p "require('./package.json').version"
          $assets = @(
            "artifacts/Nexora-Client-Setup-$version-UNSIGNED-TEST.exe",
            "artifacts/Nexora-Server-Setup-$version-UNSIGNED-TEST.exe",
            "artifacts/Nexora-Android-$version-UNSIGNED-TEST.apk",
            "artifacts/Nexora-$version-source.zip",
            "artifacts/Nexora-PWA-$version.zip",
            "artifacts/Nexora-$version.spdx.json"
          )
          foreach ($asset in $assets) { if (-not (Test-Path -LiteralPath $asset)) { throw "Missing release asset: $asset" } }
          if (Get-ChildItem artifacts -File | Where-Object { $_.Name -eq "latest.yml" -or $_.Extension -eq ".blockmap" }) {
            throw "Unsigned artifact directory contains production updater metadata"
          }
          Get-FileHash $assets -Algorithm SHA256 | Sort-Object Path | ForEach-Object { "$($_.Hash.ToLowerInvariant())  $([IO.Path]::GetFileName($_.Path))" } | Set-Content -Encoding utf8 artifacts/SHA256SUMS.txt
          $all = @($assets | ForEach-Object { (Resolve-Path $_).Path }) + (Resolve-Path "artifacts/SHA256SUMS.txt").Path
          $notes = "RELEASE_NOTES_$version.md"
          if (Test-Path -LiteralPath $notes) {
            gh release create $env:RELEASE_TAG $all --verify-tag --title "Nexora $version — UNSIGNED TEST BUILDS" --notes-file $notes --prerelease
          } else {
            gh release create $env:RELEASE_TAG $all --verify-tag --title "Nexora $version — UNSIGNED TEST BUILDS" --generate-notes --prerelease
          }
          if ($LASTEXITCODE -ne 0) { throw "Unable to publish unsigned testing prerelease" }
          @"
          ## Distribution boundary
          Windows Client/Server and Android APK are explicitly marked `UNSIGNED-TEST`.
          No `latest.yml` or `.blockmap` is published, so the production updater cannot consume these binaries.
          Source ZIP, built PWA, SPDX SBOM and SHA-256 checksums are included in the same prerelease.
          "@ | Add-Content -Encoding utf8 $env:GITHUB_STEP_SUMMARY

      - name: Verify published release assets
        if: steps.existing.outputs.published != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = node -p "require('./package.json').version"
          $release = gh release view $env:RELEASE_TAG --json assets,isPrerelease,isDraft | ConvertFrom-Json
          if ($release.isDraft) { throw "Release is still a draft" }
          $names = @($release.assets | ForEach-Object { $_.name })
          foreach ($required in @("Nexora-Android-$version-UNSIGNED-TEST.apk", "Nexora-$version-source.zip", "Nexora-PWA-$version.zip", "Nexora-$version.spdx.json", "SHA256SUMS.txt")) {
            if ($names -notcontains $required) { throw "Published release is missing $required" }
          }
          if ('${{ steps.signing.outputs.available }}' -eq 'true') {
            foreach ($required in @("Nexora-Client-Setup-$version.exe", "Nexora-Client-Setup-$version.exe.blockmap", "latest.yml", "Nexora-Server-Setup-$version.exe")) {
              if ($names -notcontains $required) { throw "Signed release is missing $required" }
            }
          } else {
            foreach ($required in @("Nexora-Client-Setup-$version-UNSIGNED-TEST.exe", "Nexora-Server-Setup-$version-UNSIGNED-TEST.exe")) {
              if ($names -notcontains $required) { throw "Testing prerelease is missing $required" }
            }
            if ($names -contains "latest.yml" -or @($names | Where-Object { $_ -match '\.blockmap$' }).Count -gt 0) {
              throw "Unsigned release must not expose updater metadata"
            }
          }
