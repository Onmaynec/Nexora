name: Verify published Nexora 3.2.4 release

on:
  push:
    branches:
      - agent/nexora-3.2.4-updater-mls-recovery
    paths:
      - .github/workflows/verify-release-3.2.4.yml

permissions:
  contents: write

jobs:
  verify-release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/nexora-3.2.4-updater-mls-recovery
          fetch-depth: 0

      - name: Wait for release and validate assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="v3.2.4"
          for attempt in $(seq 1 60); do
            if gh release view "$tag" --json tagName,name,isDraft,isPrerelease,publishedAt,url,assets > /tmp/release.json 2>/tmp/release.err; then
              break
            fi
            if [ "$attempt" -eq 60 ]; then
              cat /tmp/release.err >&2
              echo "Release $tag was not published within the verification window" >&2
              exit 1
            fi
            sleep 15
          done

          jq -e '.tagName == "v3.2.4" and .isDraft == false' /tmp/release.json >/dev/null
          mapfile -t names < <(jq -r '.assets[].name' /tmp/release.json | sort)
          required=(
            "Nexora-3.2.4-source.zip"
            "Nexora-PWA-3.2.4.zip"
            "Nexora-3.2.4.spdx.json"
            "SHA256SUMS.txt"
          )
          for name in "${required[@]}"; do
            printf '%s\n' "${names[@]}" | grep -Fx -- "$name" >/dev/null || { echo "Missing required release asset: $name" >&2; exit 1; }
          done

          prerelease=$(jq -r '.isPrerelease' /tmp/release.json)
          if [ "$prerelease" = "true" ]; then
            if printf '%s\n' "${names[@]}" | grep -E '(\.exe$|\.blockmap$|^latest\.yml$)' >/dev/null; then
              echo "Unsigned updater assets must not be present in a Source/PWA prerelease" >&2
              exit 1
            fi
          else
            signed=(
              "Nexora-Client-Setup-3.2.4.exe"
              "Nexora-Client-Setup-3.2.4.exe.blockmap"
              "latest.yml"
              "Nexora-Server-Setup-3.2.4.exe"
            )
            for name in "${signed[@]}"; do
              printf '%s\n' "${names[@]}" | grep -Fx -- "$name" >/dev/null || { echo "Missing signed stable asset: $name" >&2; exit 1; }
            done
          fi

          jq '{verifiedAt: (now | todateiso8601), tagName, name, isDraft, isPrerelease, publishedAt, url, assets: [.assets[] | {name, size, downloadCount, updatedAt}]}' /tmp/release.json > RELEASE_PUBLISH_STATUS_3.2.4.json

      - name: Commit verification result
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/verify-release-3.2.4.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test: record Nexora 3.2.4 release publication"
          git push origin HEAD:agent/nexora-3.2.4-updater-mls-recovery
