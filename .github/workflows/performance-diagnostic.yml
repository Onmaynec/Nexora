name: Unit runner diagnostic

on:
  push:
    branches: [agent/nexora-3.2.0-trust-core-mls]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unit-runner-diagnostic:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/nexora-3.2.0-trust-core-mls
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - name: Capture isolated unit runner result
        shell: bash
        run: |
          set +e
          npm run test:unit > unit.log 2>&1
          code=$?
          {
            echo "exit_code=$code"
            echo
            cat unit.log
          } > UNIT_DIAGNOSTIC.txt
          exit 0
      - name: Commit diagnostic
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add UNIT_DIAGNOSTIC.txt
          git commit -m "diagnostic: capture isolated unit runner result"
          git push origin HEAD:agent/nexora-3.2.0-trust-core-mls
