name: Diagnose Nexora 3.2.0 unit failures

on:
  push:
    branches:
      - agent/nexora-3.2.0-trust-core-mls

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - name: Run focused tests
        id: focused
        shell: bash
        run: |
          set +e
          node --test \
            test/trust-schema8.test.cjs \
            test/trust-core.test.cjs \
            test/trust-recovery.test.cjs \
            test/e2ee-plaintext-guards.test.cjs \
            test/mls-interoperability.test.cjs > focused.log 2>&1
          code=$?
          {
            echo '### Nexora 3.2.0 focused unit diagnostics'
            echo
            echo "exit_code=${code}"
            echo
            echo '```text'
            cat focused.log
            echo '```'
          } > diagnostic.md
          echo "code=${code}" >> "$GITHUB_OUTPUT"
      - name: Publish result
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment 12 --body-file diagnostic.md
      - name: Fail on regression
        if: ${{ steps.focused.outputs.code != '0' }}
        run: exit 1
