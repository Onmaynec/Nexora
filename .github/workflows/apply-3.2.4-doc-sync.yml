name: Synchronize Nexora 3.2.4 documentation

on:
  push:
    branches:
      - agent/nexora-3.2.4-updater-mls-recovery
    paths:
      - scripts/apply-3.2.4-doc-sync.py
      - .github/workflows/apply-3.2.4-doc-sync.yml
  pull_request:
    branches:
      - main
    paths:
      - scripts/apply-3.2.4-doc-sync.py
      - .github/workflows/apply-3.2.4-doc-sync.yml

permissions:
  contents: write

jobs:
  synchronize-and-verify:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'agent/nexora-3.2.4-updater-mls-recovery'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/nexora-3.2.4-updater-mls-recovery
          fetch-depth: 0

      - name: Merge current main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge --no-edit origin/main

      - name: Apply 3.2.4 documentation synchronization
        run: python scripts/apply-3.2.4-doc-sync.py

      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check and build
        run: npm run check

      - name: Unit tests
        run: npm run test:unit

      - name: Security audit
        run: npm run audit:security

      - name: Commit synchronized release source
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git commit -m "docs: synchronize Nexora 3.2.4 release documentation"
          git push origin HEAD:agent/nexora-3.2.4-updater-mls-recovery

# One-shot workflow removes itself after successful verification.
