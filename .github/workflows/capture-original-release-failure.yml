name: Capture original v3.3.0 release failure

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/capture-original-release-failure.yml"
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      GH_TOKEN: ${{ github.token }}
      FAILED_RUN_ID: "29967729776"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Extract failed job log
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-evidence
          gh run view "$FAILED_RUN_ID" --repo "${{ github.repository }}" --log-failed > release-evidence/v3.3.0-original-release-failure.log 2>&1 || true
          if [ ! -s release-evidence/v3.3.0-original-release-failure.log ]; then
            echo "No failure log returned for run $FAILED_RUN_ID" > release-evidence/v3.3.0-original-release-failure.log
          fi
      - name: Commit failure evidence
        shell: bash
        run: |
          set -euo pipefail
          git pull --rebase origin main
          git add release-evidence/v3.3.0-original-release-failure.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "docs(release): preserve original v3.3.0 failure log"
          git push origin HEAD:main
