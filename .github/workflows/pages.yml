name: Project website

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/pages.yml"
  pull_request:
    paths:
      - "website/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
      - run: node --check website/app.js
      - run: node website/validate.mjs

  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 12
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
      - name: Upload website artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: website
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Verify published redesign
        shell: bash
        run: |
          set -euo pipefail
          url="${{ steps.deployment.outputs.page_url }}build.json?cache=redesign-20260722-2"
          for attempt in $(seq 1 30); do
            payload="$(curl --fail --silent --show-error --location \
              --header 'Cache-Control: no-cache' \
              --header 'Pragma: no-cache' \
              "$url" || true)"
            if grep -Fq '"siteBuild": "redesign-20260722-2"' <<<"$payload"; then
              echo "Published redesign verified at $url"
              exit 0
            fi
            echo "Attempt $attempt: CDN still serves an older build; retrying in 10 seconds."
            sleep 10
          done
          echo "GitHub Pages did not expose redesign-20260722-2 within the verification window." >&2
          exit 1
      - name: Record live verification
        env:
          GH_TOKEN: ${{ github.token }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        shell: bash
        run: |
          set -euo pipefail
          marker='<!-- nexora-pages-redesign-20260722-2 -->'
          comments="$(gh api "repos/${GITHUB_REPOSITORY}/issues/28/comments" --paginate --jq '.[].body' || true)"
          if grep -Fq "$marker" <<<"$comments"; then
            echo "Live verification was already recorded."
            exit 0
          fi
          printf -v body '%s\n\nLive GitHub Pages verification passed for `%s`.\n\nPublished URL: %s\nSource commit: `%s`' \
            "$marker" \
            'redesign-20260722-2' \
            "$PAGE_URL" \
            "$GITHUB_SHA"
          gh api --method POST "repos/${GITHUB_REPOSITORY}/issues/28/comments" -f body="$body"
