name: Diagnose Nexora 3.3.2 post-release once

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/diagnose-post-release-3.3.2-once.yml"

permissions:
  actions: read
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Capture recent workflow state
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-evidence
          gh run list --repo "${{ github.repository }}" --limit 40 --json databaseId,workflowName,status,conclusion,event,headSha,headBranch,displayTitle,url,createdAt,updatedAt > release-evidence/post-release-runs-diagnostic.json
      - name: Commit diagnostic and remove workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/diagnose-post-release-3.3.2-once.yml
          git add release-evidence/post-release-runs-diagnostic.json
          git commit -m "docs(release): record 3.3.2 post-release diagnostic [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
