name: Prepare Nexora 3.5.0 metadata

on:
  push:
    branches:
      - release/3.5.0-mobile-continuity
    paths:
      - package.json
      - scripts/sync-release-metadata.cjs
      - scripts/prepare-mobile-continuity-3.5.cjs
      - .github/workflows/prepare-mobile-continuity-3.5.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: prepare-nexora-3-5-0-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/3.5.0-mobile-continuity
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - name: Prepare release-candidate metadata and documentation
        run: node scripts/prepare-mobile-continuity-3.5.cjs
      - name: Verify generated metadata
        run: node scripts/sync-release-metadata.cjs --check
      - name: Commit generated release surfaces
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No generated changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "chore(release): synchronize Nexora 3.5.0 surfaces"
          git push origin HEAD:release/3.5.0-mobile-continuity
