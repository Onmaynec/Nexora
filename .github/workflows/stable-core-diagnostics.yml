name: Stable Core diagnostics

on:
  push:
    branches:
      - release/3.4.0-stable-core
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: stable-core-diagnostics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - run: node scripts/check-syntax.cjs

  builder-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - run: node scripts/check-electron-builder-config.cjs

  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - run: npm run build:web

  discover:
    runs-on: ubuntu-latest
    outputs:
      files: ${{ steps.files.outputs.files }}
    steps:
      - uses: actions/checkout@v4
      - id: files
        shell: bash
        run: |
          files=$(find test -maxdepth 1 -name '*.test.cjs' ! -name 'performance.test.cjs' -printf '%f\n' | sort | node -e 'const fs=require("node:fs");const values=fs.readFileSync(0,"utf8").trim().split(/\n+/).filter(Boolean);process.stdout.write(JSON.stringify(values));')
          echo "files=$files" >> "$GITHUB_OUTPUT"

  test-file:
    needs: discover
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        file: ${{ fromJson(needs.discover.outputs.files) }}
    name: unit / ${{ matrix.file }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - run: node --test test/${{ matrix.file }}
