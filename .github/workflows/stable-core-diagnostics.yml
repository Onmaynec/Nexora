name: Stable Core diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: post-mls-changelog-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  finalize-changelog:
    if: github.head_ref == 'release/3.3.4-post-mls' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/3.3.4-post-mls
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
      - name: Insert and verify canonical release history
        run: |
          node scripts/finalize-changelog-3.3.4.cjs
          node scripts/check-syntax.cjs
      - name: Commit changelog finalization
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -- .github/workflows
          git add -A
          git commit -m "docs(release): add Nexora 3.3.4 changelog entry"
          git push origin HEAD:release/3.3.4-post-mls
