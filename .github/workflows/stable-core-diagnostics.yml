name: Stable Core diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: post-mls-finalize-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  finalize-current-surfaces:
    if: github.head_ref == 'release/3.3.4-post-mls' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/3.3.4-post-mls
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - name: Apply deterministic current-surface finalization
        run: |
          node scripts/finalize-post-mls-current-surfaces.cjs
          node scripts/check-syntax.cjs
          node website/validate.mjs
      - name: Commit finalized surfaces
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -- .github/workflows
          git add -A
          git commit -m "docs(post-mls): finalize Nexora 3.3.4 current surfaces"
          git push origin HEAD:release/3.3.4-post-mls
