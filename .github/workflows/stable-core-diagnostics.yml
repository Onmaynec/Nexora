name: Stable Core diagnostics

on:
  push:
    branches:
      - release/3.4.0-stable-core
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: stable-core-diagnostics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-3-3-4:
    if: github.event_name == 'pull_request' && github.head_ref == 'release/3.3.4-post-mls' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/3.3.4-post-mls
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - name: Prepare deterministic baseline tree
        run: |
          node scripts/prepare-post-mls-3.3.4.cjs
          npm install --package-lock-only --ignore-scripts
          node scripts/check-syntax.cjs
      - name: Commit prepared baseline
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -- .github/workflows
          git add -A
          git commit -m "release: prepare Nexora 3.3.4 post-MLS baseline"
          git push origin HEAD:release/3.3.4-post-mls

  syntax:
    if: github.head_ref != 'release/3.3.4-post-mls'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - run: node scripts/check-syntax.cjs

  builder-config:
    if: github.head_ref != 'release/3.3.4-post-mls'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - run: node scripts/check-electron-builder-config.cjs

  web-build:
    if: github.head_ref != 'release/3.3.4-post-mls'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - run: npm run build:web
