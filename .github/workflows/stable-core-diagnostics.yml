name: Stable Core diagnostics

on:
  push:
    branches:
      - release/3.4.0-stable-core
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: stable-core-diagnostics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - name: Apply legacy bootstrap contract
        run: node scripts/apply-stable-core-bootstrap.cjs
      - name: Remove executable Trust and MLS runtime
        run: node scripts/apply-stable-core-runtime-retirement.cjs
      - name: Regenerate lockfile
        run: npm install --package-lock-only --ignore-scripts
      - run: npm ci
      - name: Run unit suite with concise failure output
        shell: bash
        run: |
          set +e
          npm run test:unit > unit.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "--- concise unit failures ---"
            grep -E "^(not ok|# Subtest:)|AssertionError|ERR_|Error:|expected|actual|failureType|location" unit.log | tail -n 500 || tail -n 500 unit.log
          else
            tail -n 60 unit.log
          fi
          exit "$status"
