name: Stable Core diagnostics

on:
  push:
    branches:
      - release/3.4.0-stable-core
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: stable-core-diagnostics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - name: Run each unit file and print only failing diagnostics
        shell: bash
        run: |
          set +e
          failed=0
          for file in test/*.test.cjs; do
            if [ "$file" = "test/performance.test.cjs" ]; then
              continue
            fi
            log="$(basename "$file").log"
            node --test "$file" > "$log" 2>&1
            status=$?
            if [ "$status" -ne 0 ]; then
              failed=1
              echo "=== FAILED: $file ==="
              grep -E "^(not ok|# Subtest:)|AssertionError|ERR_|Error:|expected|actual|failureType|location|Cannot find module|SyntaxError" "$log" | tail -n 120 || tail -n 120 "$log"
            fi
          done
          if [ "$failed" -eq 0 ]; then
            echo "All unit files passed individually."
          fi
          exit "$failed"
