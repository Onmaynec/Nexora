name: Recover Nexora 3.3.0 release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/recover-v3.3.0-release.yml"

permissions:
  contents: write

concurrency:
  group: recover-nexora-v3.3.0
  cancel-in-progress: false

jobs:
  publish:
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: v3.3.0
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v3.3.0
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Verify immutable source tag
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = node -p "require('./package.json').version"
          if ($version -ne "3.3.0") { throw "Tag package version is $version, expected 3.3.0" }
          node scripts/check-release-tag.cjs
          if ($LASTEXITCODE -ne 0) { throw "Release tag validation failed" }
          $tagHead = (git rev-list -n 1 $env:RELEASE_TAG).Trim()
          $head = (git rev-parse HEAD).Trim()
          if ($tagHead -ne $head) { throw "Immutable tag does not match checked out source" }

      - run: npm ci
      - run: npm run release:check
      - run: npm run release:tag-check

      - name: Prepare source and PWA archives
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = node -p "require('./package.json').version"
          New-Item -ItemType Directory -Force artifacts | Out-Null
          git archive --format=zip --output "artifacts/Nexora-$version-source.zip" $env:RELEASE_TAG
          if ($LASTEXITCODE -ne 0) { throw "Unable to archive source tag" }
          if (-not (Test-Path -LiteralPath "client/dist/index.html")) { throw "Production PWA build is missing" }
          Compress-Archive -Path "client/dist/*" -DestinationPath "artifacts/Nexora-PWA-$version.zip" -CompressionLevel Optimal -Force
          foreach ($file in @("artifacts/Nexora-$version-source.zip", "artifacts/Nexora-PWA-$version.zip")) {
            if (-not (Test-Path -LiteralPath $file) -or (Get-Item $file).Length -lt 1024) { throw "Invalid archive: $file" }
          }

      - name: Generate SPDX SBOM with deterministic fallback
        shell: bash
        run: |
          set -euo pipefail
          version=$(node -p "require('./package.json').version")
          output="artifacts/Nexora-${version}.spdx.json"
          if ! npm sbom --omit=dev --sbom-format=spdx > "$output"; then
            echo "npm sbom failed; generating SPDX 2.3 from package-lock.json" >&2
            node <<'NODE' > "$output"
          const fs = require('node:fs');
          const crypto = require('node:crypto');
          const pkg = require('./package.json');
          const lock = require('./package-lock.json');
          const packages = [];
          const seen = new Set();
          for (const [location, value] of Object.entries(lock.packages || {})) {
            if (value?.dev) continue;
            const name = value?.name || (location ? location.split('node_modules/').pop() : pkg.name);
            const version = value?.version || (location ? null : pkg.version);
            if (!name || !version) continue;
            const key = `${name}@${version}`;
            if (seen.has(key)) continue;
            seen.add(key);
            const id = `SPDXRef-Package-${crypto.createHash('sha256').update(key).digest('hex').slice(0, 16)}`;
            packages.push({
              SPDXID: id,
              name,
              versionInfo: version,
              downloadLocation: value?.resolved || 'NOASSERTION',
              filesAnalyzed: false,
              licenseConcluded: 'NOASSERTION',
              licenseDeclared: typeof value?.license === 'string' ? value.license : 'NOASSERTION',
              copyrightText: 'NOASSERTION',
            });
          }
          const root = packages.find((item) => item.name === pkg.name && item.versionInfo === pkg.version) || packages[0];
          const document = {
            spdxVersion: 'SPDX-2.3',
            dataLicense: 'CC0-1.0',
            SPDXID: 'SPDXRef-DOCUMENT',
            name: `Nexora-${pkg.version}`,
            documentNamespace: `https://github.com/Onmaynec/Nexora/releases/tag/v${pkg.version}/spdx/${crypto.randomUUID()}`,
            creationInfo: { created: new Date().toISOString(), creators: ['Tool: Nexora release workflow'] },
            packages,
            relationships: root ? [{ spdxElementId: 'SPDXRef-DOCUMENT', relationshipType: 'DESCRIBES', relatedSpdxElement: root.SPDXID }] : [],
          };
          process.stdout.write(`${JSON.stringify(document, null, 2)}\n`);
          NODE
          fi
          node -e "const fs=require('node:fs');const p=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));if(p.spdxVersion!=='SPDX-2.3'||!Array.isArray(p.packages)||!p.packages.length)process.exit(1)" "$output"

      - name: Build Android unsigned test APK
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = node -p "require('./package.json').version"
          gradle -p android :app:assembleDebug --no-daemon
          if ($LASTEXITCODE -ne 0) { throw "Android debug build failed" }
          $apk = Get-ChildItem -Path "android/app/build/outputs/apk/debug" -Filter "*.apk" | Sort-Object Length -Descending | Select-Object -First 1
          if (-not $apk) { throw "Android APK was not created" }
          Copy-Item $apk.FullName "artifacts/Nexora-Android-$version-UNSIGNED-TEST.apk" -Force

      - name: Build explicitly unsigned Windows Client and Server installers
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = node -p "require('./package.json').version"
          npx electron-builder --config electron-builder.client.yml --win nsis --publish never
          if ($LASTEXITCODE -ne 0) { throw "Unsigned Client build failed" }
          npx electron-builder --config electron-builder.server.yml --win nsis --publish never
          if ($LASTEXITCODE -ne 0) { throw "Unsigned Server build failed" }
          Copy-Item "release/client/Nexora-Client-Setup-$version.exe" "artifacts/Nexora-Client-Setup-$version-UNSIGNED-TEST.exe" -Force
          Copy-Item "release/server/Nexora-Server-Setup-$version.exe" "artifacts/Nexora-Server-Setup-$version-UNSIGNED-TEST.exe" -Force

      - name: Validate unsigned distribution boundary
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = node -p "require('./package.json').version"
          $required = @(
            "Nexora-Client-Setup-$version-UNSIGNED-TEST.exe",
            "Nexora-Server-Setup-$version-UNSIGNED-TEST.exe",
            "Nexora-Android-$version-UNSIGNED-TEST.apk",
            "Nexora-$version-source.zip",
            "Nexora-PWA-$version.zip",
            "Nexora-$version.spdx.json"
          )
          foreach ($name in $required) {
            $path = Join-Path "artifacts" $name
            if (-not (Test-Path -LiteralPath $path) -or (Get-Item $path).Length -le 0) { throw "Missing or empty artifact: $name" }
          }
          if (Get-ChildItem artifacts -File | Where-Object { $_.Name -eq "latest.yml" -or $_.Extension -eq ".blockmap" }) {
            throw "Unsigned artifact directory contains production updater metadata"
          }
          Get-FileHash (Get-ChildItem artifacts -File).FullName -Algorithm SHA256 |
            Sort-Object Path |
            ForEach-Object { "$($_.Hash.ToLowerInvariant())  $([IO.Path]::GetFileName($_.Path))" } |
            Set-Content -Encoding utf8 artifacts/SHA256SUMS.txt

      - name: Publish immutable unsigned testing prerelease
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = node -p "require('./package.json').version"
          $existing = gh release view $env:RELEASE_TAG --json isDraft,isPrerelease 2>$null
          if ($LASTEXITCODE -eq 0) {
            $release = ($existing -join "`n") | ConvertFrom-Json
            if (-not $release.isDraft -and -not $release.isPrerelease) { throw "Stable release already exists and is immutable" }
            gh release delete $env:RELEASE_TAG --yes
            if ($LASTEXITCODE -ne 0) { throw "Unable to remove incomplete prerelease" }
          }
          $assets = Get-ChildItem artifacts -File | ForEach-Object { $_.FullName }
          $notes = "RELEASE_NOTES_$version.md"
          gh release create $env:RELEASE_TAG $assets --verify-tag --title "Nexora $version — UNSIGNED TEST BUILDS" --notes-file $notes --prerelease
          if ($LASTEXITCODE -ne 0) { throw "Unable to publish unsigned testing prerelease" }

      - name: Verify published release assets
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = node -p "require('./package.json').version"
          $release = gh release view $env:RELEASE_TAG --json assets,isPrerelease,isDraft,url | ConvertFrom-Json
          if ($release.isDraft -or -not $release.isPrerelease) { throw "Release classification is invalid" }
          $names = @($release.assets | ForEach-Object { $_.name })
          foreach ($required in @(
            "Nexora-Client-Setup-$version-UNSIGNED-TEST.exe",
            "Nexora-Server-Setup-$version-UNSIGNED-TEST.exe",
            "Nexora-Android-$version-UNSIGNED-TEST.apk",
            "Nexora-$version-source.zip",
            "Nexora-PWA-$version.zip",
            "Nexora-$version.spdx.json",
            "SHA256SUMS.txt"
          )) {
            if ($names -notcontains $required) { throw "Published release is missing $required" }
          }
          if ($names -contains "latest.yml" -or @($names | Where-Object { $_ -match '\.blockmap$' }).Count -gt 0) {
            throw "Unsigned release exposes updater metadata"
          }
          "Published and verified: $($release.url)"
