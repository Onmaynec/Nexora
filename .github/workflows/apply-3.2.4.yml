name: Apply Nexora 3.2.4 patch

on:
  push:
    branches:
      - agent/nexora-3.2.4-updater-mls-recovery
    paths:
      - scripts/apply-3.2.4-patch.cjs
      - scripts/fix-3.2.4-template.py
      - .github/workflows/apply-3.2.4.yml
  pull_request:
    branches:
      - main
    paths:
      - scripts/apply-3.2.4-patch.cjs
      - scripts/fix-3.2.4-template.py
      - .github/workflows/apply-3.2.4.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'agent/nexora-3.2.4-updater-mls-recovery'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/nexora-3.2.4-updater-mls-recovery
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0

      - name: Normalize one-shot patch
        run: |
          python scripts/fix-3.2.4-template.py
          node --check scripts/apply-3.2.4-patch.cjs

      - name: Apply patch or preserve diagnostics
        id: patch
        shell: bash
        run: |
          set +e
          node scripts/apply-3.2.4-patch.cjs > /tmp/nexora-3.2.4-patch.log 2>&1
          code=$?
          cat /tmp/nexora-3.2.4-patch.log
          if [ "$code" -ne 0 ]; then
            git reset --hard HEAD
            echo "success=false" >> "$GITHUB_OUTPUT"
          else
            echo "success=true" >> "$GITHUB_OUTPUT"
          fi
          exit 0

      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nexora-3.2.4-patch-diagnostics
          path: /tmp/nexora-3.2.4-patch.log
          if-no-files-found: warn
          retention-days: 1

      - name: Commit applied patch
        if: steps.patch.outputs.success == 'true'
        shell: bash
        run: |
          set -euo pipefail
          rm -f scripts/fix-3.2.4-template.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "feat: implement Nexora 3.2.4 update and MLS recovery"
          git push origin HEAD:agent/nexora-3.2.4-updater-mls-recovery
