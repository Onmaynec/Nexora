name: Apply Nexora 3.2.4 patch

on:
  push:
    branches:
      - agent/nexora-3.2.4-updater-mls-recovery
    paths:
      - scripts/apply-3.2.4-patch.cjs
      - .github/workflows/apply-3.2.4.yml
  pull_request:
    branches:
      - main
    paths:
      - scripts/apply-3.2.4-patch.cjs
      - .github/workflows/apply-3.2.4.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'agent/nexora-3.2.4-updater-mls-recovery'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/nexora-3.2.4-updater-mls-recovery
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0

      - name: Apply patch or preserve diagnostics
        id: patch
        shell: bash
        run: |
          set +e
          node scripts/apply-3.2.4-patch.cjs > /tmp/nexora-3.2.4-patch.log 2>&1
          code=$?
          cat /tmp/nexora-3.2.4-patch.log
          if [ "$code" -ne 0 ]; then
            git reset --hard HEAD
            cp /tmp/nexora-3.2.4-patch.log PATCH_APPLY_FAILURE.log
            echo "success=false" >> "$GITHUB_OUTPUT"
          else
            echo "success=true" >> "$GITHUB_OUTPUT"
          fi
          exit 0

      - name: Commit patch or diagnostic
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          if [ "${{ steps.patch.outputs.success }}" = "true" ]; then
            message="feat: implement Nexora 3.2.4 update and MLS recovery"
          else
            message="test: preserve Nexora 3.2.4 patch failure"
          fi
          git commit -m "$message"
          git push origin HEAD:agent/nexora-3.2.4-updater-mls-recovery
