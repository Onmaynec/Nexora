name: Sync Nexora 3.4.0 with published 3.3.4

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/sync-pr96-after-v3.3.4.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge-main:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/3.4.0-stable-core-v2
          fetch-depth: 0
      - name: Merge published baseline into release branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main release/3.4.0-stable-core-v2
          git merge --no-commit --no-ff -X ours origin/main
          git rm -f .github/workflows/sync-pr96-after-v3.3.4.yml
          git diff --cached --check
          git commit -m "merge: verified v3.3.4 publication baseline into Nexora 3.4.0"
          git push origin HEAD:release/3.4.0-stable-core-v2
