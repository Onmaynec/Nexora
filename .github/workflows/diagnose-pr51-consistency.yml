name: Diagnose PR51 release consistency

on:
  push:
    branches:
      - agent/release-3.3.2-consistency-final
    paths-ignore:
      - release-evidence/pr51-ci-failure.txt

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - name: Capture full unit failure
        shell: bash
        run: |
          set -u
          npm ci >/tmp/npm-ci.log 2>&1
          set +e
          npm run test:unit >/tmp/pr51-unit.log 2>&1
          status=$?
          set -e
          mkdir -p release-evidence
          {
            echo "exit_status=$status"
            echo
            tail -n 400 /tmp/pr51-unit.log
          } > release-evidence/pr51-ci-failure.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add release-evidence/pr51-ci-failure.txt
          if ! git diff --cached --quiet; then
            git commit -m "docs(release): capture PR 51 unit failure [skip ci]"
            git push origin HEAD:agent/release-3.3.2-consistency-final
          fi
          exit 0
