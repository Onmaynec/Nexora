name: Unit test matrix

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: unit-test-matrix-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      files: ${{ steps.files.outputs.json }}
    steps:
      - uses: actions/checkout@v4
      - id: files
        shell: bash
        run: |
          json=$(find test -maxdepth 1 -name '*.test.cjs' -print | sort | node -e 'let s="";process.stdin.on("data",d=>s+=d).on("end",()=>process.stdout.write(JSON.stringify(s.trim().split(/\n+/).filter(Boolean))))')
          echo "json=$json" >> "$GITHUB_OUTPUT"

  test:
    needs: discover
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        file: ${{ fromJson(needs.discover.outputs.files) }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: ${{ matrix.file }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - run: node --test --test-concurrency=1 "${{ matrix.file }}"
