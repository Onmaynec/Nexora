name: Stable Core migration

on:
  push:
    branches:
      - release/3.4.0-stable-core

permissions:
  contents: write

concurrency:
  group: stable-core-migration
  cancel-in-progress: true

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/3.4.0-stable-core
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - name: Apply pending source migrations
        id: migrate
        shell: bash
        run: |
          set +e
          : > migration-error.log
          status=0
          for command in \
            "node scripts/apply-stable-core-bootstrap.cjs" \
            "node scripts/apply-stable-core-runtime-retirement.cjs" \
            "npm install --package-lock-only --ignore-scripts"
          do
            echo "> $command" >> migration-error.log
            bash -lc "$command" >> migration-error.log 2>&1
            status=$?
            if [ "$status" -ne 0 ]; then
              echo "FAILED_STATUS=$status" >> migration-error.log
              break
            fi
          done
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Commit generated source changes or diagnostics
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ '${{ steps.migrate.outputs.status }}' = '0' ]; then
            rm -f migration-error.log
            git add -A
            if git diff --cached --quiet; then
              echo "No generated changes"
            else
              git commit -m "feat(stable-core): apply 3.4.0 contracts [stable-core-generated]"
              git push origin HEAD:release/3.4.0-stable-core
            fi
          else
            git add migration-error.log
            git commit -m "ci(stable-core): capture migration failure"
            git push origin HEAD:release/3.4.0-stable-core
          fi
      - name: Fail after persisted migration diagnostic
        if: steps.migrate.outputs.status != '0'
        run: exit 1
      - if: steps.migrate.outputs.status == '0'
        run: npm ci
      - if: steps.migrate.outputs.status == '0'
        run: npm run check
      - if: steps.migrate.outputs.status == '0'
        run: npm run test:unit
      - if: steps.migrate.outputs.status == '0'
        run: npm run test:performance
      - if: steps.migrate.outputs.status == '0'
        run: npm run audit:security
