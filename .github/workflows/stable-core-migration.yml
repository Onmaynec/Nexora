name: Stable Core documentation migration

on:
  push:
    branches:
      - release/3.4.0-stable-core

permissions:
  contents: write

concurrency:
  group: stable-core-docs-migration
  cancel-in-progress: true

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/3.4.0-stable-core
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - name: Synchronize current documentation surfaces
        run: node scripts/apply-stable-core-docs.cjs
      - name: Commit generated documentation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md CHANGELOG.md SECURITY.md SUPPORT.md CONTRIBUTING.md ADMIN_GUIDE.md TESTER_GUIDE.md BRANCHES.md android/README.md docs website .github/ISSUE_TEMPLATE/bug_report.md release-evidence/current.json
          if git diff --cached --quiet; then
            echo "Documentation already synchronized"
          else
            git commit -m "docs(stable-core): synchronize 3.4.0 RC surfaces [generated]"
            git push origin HEAD:release/3.4.0-stable-core
          fi
      - run: npm ci
      - run: npm run check
      - run: npm run test:unit
      - run: npm run test:performance
      - run: npm run audit:security
