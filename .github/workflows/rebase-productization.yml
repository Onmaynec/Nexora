name: Rebase productization onto main

on:
  push:
    branches:
      - agent/nexora-3.1.0-productization

permissions:
  contents: write

jobs:
  rebase:
    if: ${{ !contains(github.event.head_commit.message, '[rebase-main]') }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/nexora-3.1.0-productization
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Rebase final release commits
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main agent/nexora-3.1.0-productization
          git rebase --onto origin/main ebcb8109d676778b46d2c4fbb04362ede49273b6 agent/nexora-3.1.0-productization
          git commit --allow-empty -m "build: rebase 3.1.0 productization onto main [rebase-main]"
          git push --force-with-lease origin HEAD:agent/nexora-3.1.0-productization
