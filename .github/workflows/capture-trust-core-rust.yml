name: Capture Trust Core compiler output

on:
  push:
    branches:
      - agent/nexora-3.2.0-trust-core

permissions:
  contents: write

jobs:
  capture:
    if: ${{ !contains(github.event.head_commit.message, '[rust-diagnostics]') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/nexora-3.2.0-trust-core
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.1"
          components: clippy
      - name: Capture short compiler output
        shell: bash
        run: |
          set +e
          cargo clippy --manifest-path native/Cargo.toml --all-targets --all-features --message-format short -- -D warnings > /tmp/rust.txt 2>&1
          code=$?
          mkdir -p .diagnostics
          tail -n 320 /tmp/rust.txt > .diagnostics/trust-core-rust.txt
          printf '\nexit_code=%s\n' "$code" >> .diagnostics/trust-core-rust.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .diagnostics/trust-core-rust.txt
          git commit -m "ci: capture Trust Core compiler output [rust-diagnostics]"
          git push origin HEAD:agent/nexora-3.2.0-trust-core
