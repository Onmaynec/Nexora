name: Apply Nexora 3.2.0 Welcome routing

on:
  push:
    branches:
      - agent/nexora-3.2.0-trust-core-mls

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[3.2.0-welcome-applied]') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/nexora-3.2.0-trust-core-mls
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: node scripts/apply-3.2.0-welcome-routing.cjs
      - run: npm ci
      - run: node --test test/trust-schema8.test.cjs test/trust-core.test.cjs test/trust-recovery.test.cjs test/e2ee-plaintext-guards.test.cjs
      - run: npm run check
      - name: Commit verified Welcome routing
        shell: bash
        run: |
          set -euo pipefail
          rm -f scripts/apply-3.2.0-welcome-routing.cjs .github/workflows/apply-3.2.0-welcome-routing.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: scope Nexora 3.2.0 Welcome delivery [3.2.0-welcome-applied]"
          git push origin HEAD:agent/nexora-3.2.0-trust-core-mls
