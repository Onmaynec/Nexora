name: Apply Nexora 3.2.3 security hardening

on:
  push:
    branches: [agent/nexora-3.2.3-security-hardening]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/nexora-3.2.3-security-hardening
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - name: Apply, verify and publish patch or diagnostics
        shell: bash
        run: |
          set -uo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f APPLY_3_2_3_FAILURE.log
          {
            node scripts/apply-3.2.3-security-hardening.cjs &&
            npm run release:sync-version &&
            npm ci &&
            npm run release:check
          } >apply-output.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            output="$(cat apply-output.log)"
            git reset --hard HEAD
            printf '%s\n' "$output" > APPLY_3_2_3_FAILURE.log
            git add APPLY_3_2_3_FAILURE.log
            git commit -m "ci: capture 3.2.3 patch failure"
            git push origin HEAD:agent/nexora-3.2.3-security-hardening
            exit 0
          fi
          rm -f apply-output.log
          git add -A
          git diff --cached --check
          git diff --cached --quiet && { echo "No patch changes were produced"; exit 1; }
          git commit -m "fix: harden Trust resource and recovery boundaries"
          git push origin HEAD:agent/nexora-3.2.3-security-hardening
