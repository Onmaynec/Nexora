name: Format Trust Core

on:
  push:
    branches:
      - agent/nexora-3.2.0-trust-core

permissions:
  contents: write

jobs:
  format:
    if: ${{ !contains(github.event.head_commit.message, '[rustfmt]') }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/nexora-3.2.0-trust-core
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.1"
          components: rustfmt
      - run: cargo fmt --manifest-path native/Cargo.toml --all
      - name: Commit formatting
        shell: bash
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add native
          git commit -m "style: format Trust Core [rustfmt]"
          git push origin HEAD:agent/nexora-3.2.0-trust-core
