name: Verify Nexora 3.1.0 release

on:
  push:
    branches:
      - automation/nexora-3.1.0-tag

permissions:
  contents: write

jobs:
  verify-release:
    if: ${{ !contains(github.event.head_commit.message, '[release-verified]') }}
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: automation/nexora-3.1.0-tag
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Wait for immutable GitHub Release
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .release-verification
          for attempt in $(seq 1 80); do
            if gh release view v3.1.0 --repo Onmaynec/Nexora --json tagName,name,isDraft,isPrerelease,url,publishedAt,targetCommitish,assets > .release-verification/v3.1.0.json 2>/dev/null; then
              jq -e '.tagName == "v3.1.0" and .isDraft == false and (.assets | length) >= 4' .release-verification/v3.1.0.json >/dev/null
              break
            fi
            if [ "$attempt" -eq 80 ]; then
              echo "Release v3.1.0 was not published within the verification window" >&2
              exit 1
            fi
            sleep 15
          done
      - name: Record verified release metadata
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .release-verification/v3.1.0.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "ci: record verified v3.1.0 release [release-verified]"
          git push origin HEAD:automation/nexora-3.1.0-tag
