name: Inspect Nexora 3.3.1 publication

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/inspect-3.3.1-release.yml"

permissions:
  actions: read
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Inspect release workflow and publication
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p release-evidence
          gh run list --workflow release.yml --limit 10 --json databaseId,displayTitle,status,conclusion,headSha,event,createdAt,updatedAt,url > /tmp/runs.json
          if gh release view v3.3.1 --json url,assets,isPrerelease,isDraft,tagName,name,publishedAt > /tmp/release.json 2>/dev/null; then
            release_available=true
          else
            release_available=false
            printf 'null\n' > /tmp/release.json
          fi
          RELEASE_AVAILABLE="$release_available" node <<'NODE'
          "use strict";
          const fs = require("node:fs");
          const evidence = {
            schemaVersion: 1,
            inspectedAt: new Date().toISOString(),
            tag: "v3.3.1",
            releaseAvailable: process.env.RELEASE_AVAILABLE === "true",
            release: JSON.parse(fs.readFileSync("/tmp/release.json", "utf8")),
            workflowRuns: JSON.parse(fs.readFileSync("/tmp/runs.json", "utf8")),
          };
          fs.writeFileSync("release-evidence/diagnostic-v3.3.1.json", `${JSON.stringify(evidence, null, 2)}\n`);
          NODE
      - name: Commit diagnostic evidence and remove one-shot workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add release-evidence/diagnostic-v3.3.1.json
          git rm .github/workflows/inspect-3.3.1-release.yml
          git commit -m "docs(release): record 3.3.1 pipeline diagnostic [skip ci]"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
