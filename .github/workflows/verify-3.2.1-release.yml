name: Diagnose Nexora 3.2.1 main CI

on:
  push:
    branches: [agent/nexora-3.2.1-login-shutdown-fix]
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  diagnose-main-ci:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      FAILED_RUN_ID: "29927717990"
      FAILED_JOB_ID: "88949070603"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/nexora-3.2.1-login-shutdown-fix
          fetch-depth: 0
      - name: Capture failing Windows performance output
        shell: bash
        run: |
          set -euo pipefail
          gh run view "$FAILED_RUN_ID" --job "$FAILED_JOB_ID" --log > main-ci-full.log
          {
            echo "run_id=$FAILED_RUN_ID"
            echo "job_id=$FAILED_JOB_ID"
            echo
            grep -n -E "test:performance|not ok|AssertionError|20 секунд|duration_ms|Process completed|ERR_ASSERTION" main-ci-full.log | tail -n 160 || true
            echo
            echo "--- LOG TAIL ---"
            tail -n 260 main-ci-full.log
          } > MAIN_CI_FAILURE_3.2.1.txt
      - name: Commit diagnostic
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add MAIN_CI_FAILURE_3.2.1.txt
          git commit -m "diagnostic: capture failed 3.2.1 main performance run"
          git push origin HEAD:agent/nexora-3.2.1-login-shutdown-fix
