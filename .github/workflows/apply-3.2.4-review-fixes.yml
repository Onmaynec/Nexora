name: Apply Nexora 3.2.4 review fixes

on:
  push:
    branches:
      - agent/nexora-3.2.4-updater-mls-recovery
    paths:
      - scripts/apply-3.2.4-review-fixes.py
      - .github/workflows/apply-3.2.4-review-fixes.yml
  pull_request:
    branches:
      - main
    paths:
      - scripts/apply-3.2.4-review-fixes.py
      - .github/workflows/apply-3.2.4-review-fixes.yml

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'agent/nexora-3.2.4-updater-mls-recovery'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/nexora-3.2.4-updater-mls-recovery
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm

      - name: Apply review fixes
        run: python scripts/apply-3.2.4-review-fixes.py

      - name: Install dependencies
        run: npm ci

      - name: Syntax, builder config and web build
        run: npm run check

      - name: Unit and integration tests
        id: unit
        shell: bash
        run: |
          set +e
          set -o pipefail
          npm run test:unit 2>&1 | tee /tmp/nexora-3.2.4-unit.log
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload unit test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nexora-3.2.4-unit-log
          path: /tmp/nexora-3.2.4-unit.log
          if-no-files-found: error
          retention-days: 1

      - name: Enforce unit test result
        if: steps.unit.outputs.exit_code != '0'
        run: exit 1

      - name: Security audit
        run: npm run audit:security

      - name: Commit verified fixes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: complete Nexora 3.2.4 regression coverage"
          git push origin HEAD:agent/nexora-3.2.4-updater-mls-recovery
