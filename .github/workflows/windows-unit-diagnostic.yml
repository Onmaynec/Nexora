name: Windows unit diagnostic

on:
  push:
    branches: [agent/nexora-3.2.0-trust-core-mls]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-unit-diagnostic:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/nexora-3.2.0-trust-core-mls
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - run: npm ci
      - name: Capture complete unit TAP
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          npm run test:unit *> windows-unit.log
          $code = $LASTEXITCODE
          @("exit_code=$code", "", "--- TAP tail ---") + (Get-Content windows-unit.log -Tail 300) | Set-Content WINDOWS_UNIT_DIAGNOSTIC.txt
          exit 0
      - name: Commit diagnostic tail
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add WINDOWS_UNIT_DIAGNOSTIC.txt
          git commit -m "diagnostic: capture Windows unit TAP"
          git push origin HEAD:agent/nexora-3.2.0-trust-core-mls
