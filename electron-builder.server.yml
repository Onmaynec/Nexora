appId: com.nexora.server
productName: Nexora Server
artifactName: Nexora-Server-Setup-${version}.${ext}
asar: true
npmRebuild: false
directories:
  output: release/server
files:
  - electron/server-main.cjs
  - electron/server-preload.cjs
  - electron/server-shell/**/*
  - electron/update-service.cjs
  - server/**/*
  - client/dist/**/*
  - package.json
extraMetadata:
  main: electron/server-main.cjs
win:
  icon: build/icon.ico
  target:
    - nsis
nsis:
  oneClick: false
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  installerSidebar: build/installerSidebar.bmp
  uninstallerSidebar: build/installerSidebar.bmp
  installerLanguages:
    - ru_RU
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Nexora Server
  uninstallDisplayName: Nexora Server
