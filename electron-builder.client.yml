appId: com.nexora.client
productName: Nexora Client
artifactName: Nexora-Client-Setup-${version}.${ext}
asar: true
npmRebuild: false
directories:
  output: release/client
publish:
  provider: github
  owner: Onmaynec
  repo: Nexora
  releaseType: draft
  publishAutoUpdate: true
files:
  - electron/client-main.cjs
  - electron/client-connection.cjs
  - electron/client-preload.cjs
  - electron/client-shell/**/*
  - electron/update-service.cjs
  - electron/release-experience.cjs
  - package.json
extraResources:
  - from: build/Nexora-Client-Test-Mode.cmd
    to: Nexora-Client-Test-Mode.cmd
extraMetadata:
  main: electron/client-main.cjs
win:
  icon: build/icon.ico
  verifyUpdateCodeSignature: true
  target:
    - nsis
nsis:
  oneClick: false
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  installerSidebar: build/installerSidebar.bmp
  uninstallerSidebar: build/installerSidebar.bmp
  include: build/installer.nsh
  installerLanguages:
    - ru_RU
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Nexora Client
  uninstallDisplayName: Nexora Client
